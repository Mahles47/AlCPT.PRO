<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PWA Checker</title>
<style>
  body { font-family: monospace; background: #0f172a; color: #f8fafc; padding: 20px; font-size: 13px; }
  h2 { color: #f59e0b; }
  .ok   { color: #10b981; }
  .err  { color: #ef4444; }
  .warn { color: #f59e0b; }
  .box  { background: #1e293b; border-radius: 8px; padding: 12px; margin: 8px 0; word-break: break-all; }
  .item { margin: 6px 0; }
</style>
</head>
<body>
<h2>🔍 PWA Diagnostics</h2>
<div id="out"></div>
<script>
const log = (msg, cls='') => {
  document.getElementById('out').innerHTML +=
    `<div class="box item ${cls}">${msg}</div>`;
};

// 1. HTTPS
log('🌐 Protocol: <b>' + location.protocol + '</b> — ' +
  (location.protocol==='https:' ? '<span class="ok">✅ HTTPS OK</span>' : '<span class="err">❌ يحتاج HTTPS</span>'));

// 2. SW Support
log('⚙️ Service Worker: ' +
  ('serviceWorker' in navigator ? '<span class="ok">✅ مدعوم</span>' : '<span class="err">❌ غير مدعوم</span>'));

// 3. SW Registration
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    if (regs.length === 0) {
      log('📋 SW Status: <span class="err">❌ مفيش Service Worker مسجل!</span>');
    } else {
      regs.forEach(r => {
        log('📋 SW Scope: <span class="ok">✅ ' + r.scope + '</span><br>State: ' + (r.active ? '<span class="ok">active</span>' : '<span class="warn">'+JSON.stringify(r)+'</span>'));
      });
    }
  });
}

// 4. Manifest fetch
fetch('./manifest.json')
  .then(r => {
    log('📄 manifest.json HTTP: <span class="' + (r.ok?'ok':'err') + '">' + (r.ok?'✅':'❌') + ' Status ' + r.status + '</span>');
    return r.json();
  })
  .then(m => {
    log('📄 name: <b>' + m.name + '</b>');
    log('📄 start_url: <b>' + m.start_url + '</b>');
    log('📄 scope: <b>' + m.scope + '</b>');
    log('📄 display: <b>' + (m.display||'❌ مفيش') + '</b>');
    log('📄 icons count: <b>' + (m.icons||[]).length + '</b>');

    // Check each icon
    const checks = (m.icons||[]).map(ic =>
      fetch(ic.src).then(r => ({src: ic.src, ok: r.ok, status: r.status, sizes: ic.sizes, purpose: ic.purpose}))
    );
    Promise.all(checks).then(results => {
      results.forEach(ic => {
        log((ic.ok?'🖼️ <span class="ok">✅':'🖼️ <span class="err">❌') +
          ' ' + ic.src + '</span> [' + ic.sizes + '] ' + (ic.purpose||'') +
          (ic.ok ? '' : ' <span class="err">← 404!</span>'));
      });

      const has192 = results.find(i => i.sizes==='192x192' && i.ok);
      const has512 = results.find(i => i.sizes==='512x512' && i.ok);
      log('<br>--- الخلاصة ---');
      log(has192 ? '<span class="ok">✅ icon 192x192 موجود</span>' : '<span class="err">❌ icon 192x192 مفقود أو 404 — ده السبب الرئيسي!</span>');
      log(has512 ? '<span class="ok">✅ icon 512x512 موجود</span>' : '<span class="err">❌ icon 512x512 مفقود أو 404</span>');
    });
  })
  .catch(e => log('❌ فشل تحميل manifest.json: ' + e, 'err'));

// 5. beforeinstallprompt
let installFired = false;
window.addEventListener('beforeinstallprompt', () => { installFired = true; });
setTimeout(() => {
  log('📲 beforeinstallprompt: ' +
    (installFired ? '<span class="ok">✅ fired — التطبيق قابل للتثبيت</span>'
                  : '<span class="warn">⚠️ لم يفعّل — Chrome مش شايف PWA كاملة</span>'));
}, 2000);

// 6. Current URL info
log('🔗 Current URL: ' + location.href);
log('📁 Base: ' + location.origin + location.pathname.replace(/[^/]*$/,''));
</script>
</body>
</html>
