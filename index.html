{n:138, q:"Many people can't find permanent jobs nowadays, so they try to look for _____ jobs.", opts:["Mobile","diagonal","relevant","temporary"], correct:3, kw:"temporary", logic:"عكس permanent هو temporary، يعني مؤقت مش ثابت.", cat:"synonyms"},
{n:139, q:"There were many _____, who needed immediate assistance.", opts:["Victims","shocks","accidents","hurt"], correct:0, kw:"victims", logic:"اللي بيحتاج مساعدة فورية هم ضحايا، والكلمة الصح هي victims.", cat:"vocabulary"},
{n:140, q:"The students like Mr. William because he is very _____", opts:["General","friendly","properly","fairly"], correct:1, kw:"friendly", logic:"محتاجين صفة (adjective) تكمل is، والكلمة المنطقية هي friendly يعني ودود.", cat:"vocabulary"},
{n:141, q:"She was _____ of killing her husband.", opts:["Refused","forced","arrested","accused"], correct:3, kw:"accused of", logic:"كلمة accused of معناها اتهمت بـ، والجملة بتقول إنها اتهمت بقتل جوزها.", cat:"vocabulary"},
{n:142, q:"The chemicals in paint are _____ to health.", opts:["Personal","hazardous","unlikely","main"], correct:1, kw:"hazardous", logic:"المواد الكيميائية في الدهان خطرة على الصحة، والكلمة الصح هي hazardous.", cat:"vocabulary"},
{n:143, q:"The _____ predicts rain tomorrow on TV.", opts:["Scientist","leader","weatherman","employer"], correct:2, kw:"weatherman", logic:"اللي بيتوقع الطقس على التليفزيون هو weatherman أو meteorologist.", cat:"vocabulary"},
{n:144, q:"The visibility is very bad here; I can't _____ anything.", opts:["Warn","hear","see","reach"], correct:2, kw:"visibility", logic:"الـ visibility بتتكلم عن الرؤية، فلو الـ visibility مش كويسة يبقى مش قادر تشوف.", cat:"vocabulary"},
{n:145, q:"The _____ is a part of the car.", opts:["Tool","Carburetor","Thermostat","Barometer"], correct:1, kw:"Carburetor", logic:"الـ Carburetor هو الكاربريتر جزء من موتور العربية. أما Barometer فهو جهاز قياس ضغط الجو.", cat:"vocabulary"},
{n:146, q:"I can't concentrate on my homework; would you _____ the TV?", opts:["Watch","fix","switch off","switch on"], correct:2, kw:"switch off", logic:"مش قادر يركز عشان التليفزيون شاغله، يعني المطلوب هو switch off يعني تفل التليفزيون.", cat:"vocabulary"},
{n:147, q:"She was _____ 3 years ago.", opts:["Supposed","designed","worked","employed"], correct:3, kw:"employed", logic:"كلمة employed معناها اشتغلت أو اتوظفت.", cat:"vocabulary"},
{n:148, q:"This way isn't safe. It's _____", opts:["Full","fast","dangerous","bored"], correct:2, kw:"safe / dangerous", logic:"عكس safe هو dangerous يعني خطر.", cat:"synonyms"},
{n:149, q:"The coffee _____ really nice.", opts:["Smells","boils","drinks","cooks"], correct:0, kw:"linking verb / smells", logic:"بنستخدم smells كـ linking verb هنا، يعني القهوة ريحتها حلوة.", cat:"grammar"},
{n:150, q:"They want to _____ some new workers.", opts:["Cover","hire","own","lie"], correct:1, kw:"hire", logic:"كلمة hire معناها يوظّف أو يشغّل ناس جدد.", cat:"vocabulary"},
{n:151, q:"We use the _____ to stop the car.", opts:["Bike","break","brakes","machine"], correct:2, kw:"brakes", logic:"الـ brakes هي الفرامل اللي بنستخدمها عشان نوقف العربية.", cat:"vocabulary"},
{n:152, q:"How many _____ are in this world?", opts:["Lessons","letters","names","languages"], correct:3, kw:"languages", logic:"السؤال عن كم حاجة موجودة في العالم، والمنطقي هو languages يعني كم لغة في العالم.", cat:"vocabulary"},
{n:153, q:"They are listening to the _____", opts:["Radio","time","TV","map"], correct:0, kw:"listen to the radio", logic:"بنستخدم listen to مع radio، مش watch، عشان كدا radio هي الإجابة الصح.", cat:"vocabulary"},
{n:154, q:"What is the _____ to the question?", opts:["Homework","answer","word","sentence"], correct:1, kw:"answer", logic:"الإجابة على سؤال هي answer.", cat:"vocabulary"},
{n:155, q:"The students sit on the _____", opts:["School","class","chairs","blackboard"], correct:2, kw:"chairs", logic:"الطلاب بيقعدوا على كراسي، والكلمة الصح هي chairs.", cat:"vocabulary"},
{n:156, q:"The test was not easy. The test was _____", opts:["Difficult","easy","short","not difficult"], correct:0, kw:"not easy = difficult", logic:"عكس easy هو difficult، يعني الامتحان كان صعب.", cat:"synonyms"},
{n:157, q:"He puts the book _____ the table.", opts:["On","in","from","of"], correct:0, kw:"on the table", logic:"لما بنحط حاجة فوق سطح بنستخدم on، يعني on the table.", cat:"grammar"},
{n:158, q:"I _____ English well.", opts:["Listen","say","speak","ask"], correct:2, kw:"speak a language", logic:"بنستخدم speak مع اللغات، يعني speak English.", cat:"grammar"},
{n:159, q:"He asked about _____", opts:["What time did the plane take off","What time the plane would take off","What time the plane will take off","What time will the plane take off"], correct:1, kw:"indirect question / reported speech", logic:"بعد asked about بنستخدم indirect question بترتيب عادي مع تغيير الزمن، يعني the plane would take off.", cat:"grammar"},
{n:160, q:"He said that he _____ TV for two hours.", opts:["Was watching","had been watching","had being watched","was being watched"], correct:1, kw:"past perfect continuous in reported speech", logic:"في الـ reported speech الماضي المستمر بيتحول لـ past perfect continuous: had been watching.", cat:"grammar"},
{n:161, q:"They talk about the weather's _____", opts:["Severeness","severing","severition","severity"], correct:3, kw:"severity", logic:"الاسم الصح من كلمة severe هو severity يعني شدة وقسوة الطقس.", cat:"grammar"},
{n:162, q:"The terrible weather affected the crops; _____", opts:["So","because","consequently","although"], correct:2, kw:"consequently / result", logic:"الجملة التانية نتيجة للأولى، وكلمة consequently معناها وبالتالي أو كنتيجة لذلك.", cat:"grammar"},
{n:163, q:"Her behavior really began to make me angry. It _____", opts:["Cheered me up","irritated me","messed me up","amazed me"], correct:1, kw:"irritated", logic:"لو حاجة بتعملك angry يبقى هي irritated you يعني أزعجتك وضايقتك.", cat:"synonyms"},
{n:164, q:"The meeting will resume at 0945.", opts:["Begin again","wind up","summarize","conclude"], correct:0, kw:"resume", logic:"كلمة resume معناها يبدأ من جديد بعد توقف، وأقرب كلمة ليها هي begin again.", cat:"synonyms"},
{n:165, q:"The skirmish had hardly begun when we exhausted our supply of ammo.", opts:["Ran away from","ran through","ran out of","ran across to"], correct:2, kw:"exhausted supply", logic:"كلمة exhausted supply معناها خلصت المؤن، وأقرب تعبير ليها هو ran out of.", cat:"synonyms"},
{n:166, q:"If you _____ 3 by 7, you will get 21.", opts:["Divide","subtract","add","multiply"], correct:3, kw:"multiply", logic:"3 في 7 بيساوي 21، وده ضرب = multiply.", cat:"vocabulary"},
{n:167, q:"I would study Friday nights in the learning Center _____", opts:["Were I you","if I am do","be I you","was I you"], correct:0, kw:"inversion / conditional", logic:"في الـ formal conditional بنعمل inversion بنحط were الأول: Were I you = If I were you.", cat:"grammar"},
{n:168, q:"The outfit Lt Smith's wife wore to the General's reception was unsuitable.", opts:["Inappropriate","gorgeous","tasteful","perfect"], correct:0, kw:"unsuitable", logic:"كلمة unsuitable معناها مش مناسب، وأقرب كلمة ليها هي inappropriate.", cat:"synonyms"},
{n:169, q:"We need to put our heads together and come up with a conclusion.", opts:["We need to be careful about the conclusion.","We need to come to an agreement.","We need to work together.","We need to stay close to each other."], correct:2, kw:"put our heads together", logic:"تعبير put our heads together معناه نشتغل مع بعض ونفكر مع بعض.", cat:"vocabulary"},
{n:170, q:"During his briefing, he gave us a smattering of details.", opts:["An abundance","a huge number","scores","not very many"], correct:3, kw:"smattering", logic:"كلمة smattering معناها قليل جداً من المعلومات، مش كتير.", cat:"synonyms"},
{n:171, q:"Bob: What did you do at the dentist's? Lena: I got _____", opts:["the children's teeth cleaning","the children's teeth clean","the children's teeth to clean","the children's teeth cleaned"], correct:3, kw:"causative get", logic:"في الـ causative get بنقول get + object + past participle، يعني got the children's teeth cleaned.", cat:"grammar"},
{n:172, q:"She really regrets _____ with her family during the Christmas holidays.", opts:["To not being","not be","not to be","not being"], correct:3, kw:"regret + gerund", logic:"بعد regret بنستخدم gerund (ing)، والنفي بيجي قبل الـ gerund: not being.", cat:"grammar"},
{n:173, q:"The commander _____ that I was the best of my class.", opts:["Tell me","say me","told me","say to me"], correct:2, kw:"told me", logic:"فعل tell بيحتاج مفعول به شخص مباشرة: told me. أما say بتقول said to me أو said that.", cat:"grammar"},
{n:174, q:"That movie was based on _____ story.", opts:["A true","a truth","truth","true"], correct:0, kw:"a true story", logic:"التعبير الصح هو a true story يعني قصة حقيقية، وده تعبير ثابت في الإنجليزي.", cat:"grammar"},
{n:175, q:"Our position _____ by the enemy.", opts:["Were overran","were overrun","was overrun","was overran"], correct:2, kw:"passive / singular", logic:"position مفرد عشان كدا was، والفعل overrun هو الصح مش overran في الـ passive.", cat:"grammar"},
{n:176, q:"Our positions _____ by the enemy.", opts:["Were overran","were overrun","was overrun","was overran"], correct:1, kw:"passive / plural", logic:"positions جمع عشان كدا were، والفعل overrun هو الصح في الـ passive.", cat:"grammar"},
{n:177, q:"The final thing to do is _____ your troops.", opts:["Conciliate","consequiate","reconciliate","reconsolidate"], correct:3, kw:"reconsolidate", logic:"كلمة reconsolidate معناها تعيد تجميع وتنظيم قواتك بعد عملية.", cat:"vocabulary"},
{n:178, q:"An offensive odor would be _____", opts:["a bad stink","a nice aroma","a wonderful fragrance","a pleasant smell"], correct:0, kw:"offensive odor", logic:"كلمة offensive معناها مؤذي ومزعج، وودا يعني ريحة وحشة، يعني a bad stink.", cat:"synonyms"},
{n:179, q:"He doesn't have to do PT because he is _____ profile.", opts:["On","of","in","at"], correct:0, kw:"on profile", logic:"تعبير on profile في المصطلحات العسكرية معناه عنده إعفاء طبي من بعض التمارين.", cat:"grammar"},
{n:180, q:"I _____ too sick to go to the game last night.", opts:["fell","fall","fell","felt"], correct:3, kw:"felt / linking verb", logic:"محتاجين felt يعني شعرت، مش fell يعني وقعت. felt + adjective بتعبر عن الحالة.", cat:"grammar"},
{n:181, q:"The _____ is in the front of the theatre. It's where the actors perform the play.", opts:["drama","stage","seat","walk"], correct:1, kw:"stage", logic:"المكان اللي بيقف فيه الممثلين عشان يمثلوا هو الـ stage يعني المسرح.", cat:"vocabulary"},
{n:182, q:"I will now tell you _____", opts:["the procedure is what","the procedure what is","what the procedure is","what is the procedure"], correct:2, kw:"indirect question / embedded", logic:"بعد tell بنستخدم indirect question بترتيب عادي: what the procedure is.", cat:"grammar"},
{n:183, q:"If you want to get a job here in this bank, you need to go to the _____", opts:["promotion","career","opportunity","personnel"], correct:3, kw:"personnel", logic:"قسم الموظفين اللي بيتعاملوا مع التوظيف هو الـ personnel department.", cat:"vocabulary"},
{n:184, q:"If today is Tuesday, then tomorrow _____ Wednesday.", opts:["am","were","was","is"], correct:3, kw:"present simple / fact", logic:"ده حقيقة ثابتة، عشان كدا بنستخدم المضارع البسيط is.", cat:"grammar"},
{n:185, q:"Pamela _____ this book for a month.", opts:["Had has","is","have had","has had"], correct:3, kw:"Present Perfect", logic:"بنستخدم Present Perfect عشان الحدث بدأ في الماضي ولسه مستمر: has had.", cat:"grammar"},
{n:186, q:"The prices at this supermarket are not high. They are _____", opts:["Sharp","busy","reasonable","boring"], correct:2, kw:"reasonable", logic:"لو الأسعار مش غالية، يبقى هي reasonable يعني معقولة.", cat:"synonyms"},
{n:187, q:"I have a(n) _____ with Dr. Dean this Tuesday.", opts:["Appointment","emergency","medicine","symptom"], correct:0, kw:"appointment", logic:"لما بتروح دكتور بموعد محدد ده بيتسمى appointment.", cat:"vocabulary"},
{n:188, q:"Pat was a secretary before she _____ Ron.", opts:["got married","worked","gets married","married"], correct:3, kw:"married", logic:"بنقول married فلان من غير got، أو got married لوحدها. هنا الأنسب هو married Ron مباشرة.", cat:"grammar"},
{n:189, q:"I have _____ problems right now.", opts:["Some of","too many","a lot","too much"], correct:1, kw:"too many + countable", logic:"كلمة problems جمع محسوب (countable)، عشان كدا بنستخدم too many مش too much.", cat:"grammar"},
{n:190, q:"Ask Mr. Reply _____ this letter.", opts:["To sign","signing","sign","signed"], correct:0, kw:"ask + object + to + verb", logic:"بعد ask + object بنستخدم to + base verb: ask him to sign.", cat:"grammar"},
{n:191, q:"A small coin worth ten cents is called _____", opts:["A penny","a dime","a quarter","a nickel"], correct:1, kw:"dime", logic:"الـ dime هو عملة أمريكية قيمتها 10 سنت. الـ penny = 1 cent, nickel = 5 cents, quarter = 25 cents.", cat:"vocabulary"},
{n:192, q:"I was born _____ Puerto Rico.", opts:["of","in","on","at"], correct:1, kw:"born in + country/city", logic:"بنستخدم in قبل أسماء الدول والمدن، يعني born in Puerto Rico.", cat:"grammar"},
{n:193, q:"This is the _____ worksheet you will ever have.", opts:["Most easiest","easier","easy","easiest"], correct:3, kw:"superlative", logic:"بنستخدم superlative: the easiest من غير most عشان easy كلمة قصيرة.", cat:"grammar"},
{n:194, q:"The meat from a cow is called _____", opts:["Pork","chicken","fish","beef"], correct:3, kw:"beef", logic:"لحم البقرة بيتسمى beef، لحم الخنزير pork، لحم الفراخ chicken.", cat:"vocabulary"},
{n:195, q:"Next week will be his final week here at DLI.", opts:["last","beginning","initial","first"], correct:0, kw:"final = last", logic:"كلمة final معناها الأخير، وأقرب كلمة ليها هي last.", cat:"synonyms"},
{n:196, q:"Mark's airplane departed at 3:00 p.m. It will arrive _____ at 10:00 p.m.", opts:["Round-trip","off","tonight","together"], correct:2, kw:"tonight", logic:"الطيارة هتوصل الساعة 10 بالليل، وده معناه tonight يعني الليلة.", cat:"vocabulary"},
{n:197, q:"You really should speak more English during break.", opts:["must","have to","ought to","can"], correct:2, kw:"should = ought to", logic:"كلمة should وأقرب كلمة ليها في المعنى هي ought to، كلاهم بيعبروا عن نصيحة.", cat:"grammar"},
{n:198, q:"I _____ last night. I was bored.", opts:["Didn't do nothing","done nothing","didn't do something","didn't do anything"], correct:3, kw:"double negative", logic:"في الإنجليزي الصح مش بنستخدم نفيين مع بعض، يعني didn't + anything مش didn't + nothing.", cat:"grammar"},
{n:199, q:"She never _____ English.", opts:["speaking","to speak","speak","speaks"], correct:3, kw:"present simple / third person", logic:"هو/هي/هو في المضارع البسيط بياخد s في الآخر: speaks.", cat:"grammar"},
{n:200, q:"Is your answer correct?", opts:["Yes, it's a wrong answer.","Yes, it's the right answer","No, my answer is correct","Yes, you are welcome"], correct:1, kw:"correct = right", logic:"السؤال عن لو الإجابة صح، والرد المنطقي هو Yes, it's the right answer.", cat:"vocabulary"},
{n:201, q:"Mary _____ two brothers.", opts:["have","are","is","has"], correct:3, kw:"has / third person singular", logic:"Mary هو he/she/it فبياخد has مش have.", cat:"grammar"},
{n:202, q:"English _____ not easy for me.", opts:["Were","am","are","is"], correct:3, kw:"English is singular", logic:"اسم اللغة English مفرد، عشان كدا بيباخد is.", cat:"grammar"},
{n:203, q:"Can you tell me _____?", opts:["how to wrapping this package","how to wrap this package","how did I wrap this package","how do I wrap this package"], correct:1, kw:"how to + base verb", logic:"بعد how to بنستخدم base verb من غير ing أو تصريف: how to wrap.", cat:"grammar"},
{n:204, q:"Lt. Smith drew a helix on the board. You mean he drew a _____", opts:["triangle","square","spiral","circle"], correct:2, kw:"helix", logic:"كلمة helix معناها شكل لولبي أو حلزوني، وأقرب كلمة ليها هي spiral.", cat:"synonyms"},
{n:205, q:"My sister _____ to her company everyday.", opts:["Is walk","walking","walk","walks"], correct:3, kw:"present simple / third person", logic:"sister هو he/she عشان كدا walks بالـ s في المضارع البسيط.", cat:"grammar"},
{n:206, q:"I want to stay _____ France for a week or two.", opts:["In","of","on","at"], correct:0, kw:"stay in + country", logic:"بنستخدم in قبل أسماء الدول: stay in France.", cat:"grammar"},
{n:207, q:"A: You ought to study hard, our test is tomorrow. B: Yes, we _____", opts:["Have to","will","must","should"], correct:3, kw:"ought to = should", logic:"كلمة ought to تعني نفس should تقريباً، وده أقرب معنى ليها.", cat:"grammar"},
{n:208, q:"I haven't visited the Egyptian museum _______.", opts:["Never","yet","none","still"], correct:1, kw:"yet with Present Perfect", logic:"بنستخدم yet في الجمل السلبية مع الـ Present Perfect عشان نعبر عن حاجة لسه محصلتش.", cat:"grammar"},
{n:209, q:"This test is _____", opts:["Bored","boring","bores","bore"], correct:1, kw:"boring / adjective", logic:"الامتحان هو اللي بيسبب الملل، عشان كدا هو boring مش bored. bored بنستخدمها للشخص اللي حاسس بالملل.", cat:"grammar"},
{n:210, q:"The price of cars, boats, furs, and other luxury items _____ rising.", opts:["have been","are being","are","is"], correct:3, kw:"subject-verb agreement", logic:"الـ subject الحقيقي هو price وهو مفرد، عشان كدا is rising.", cat:"grammar"},
{n:211, q:"I would be careful with my answer if I _____ you.", opts:["am","will be","were","had been"], correct:2, kw:"second conditional", logic:"في الـ second conditional بعد if بنستخدم were مع كل الضمائر.", cat:"grammar"},
{n:212, q:"During the last storm many houses _____", opts:["Have been destroying","were destroyed","destroying","destroyed"], correct:1, kw:"passive / past simple", logic:"البيوت اتدمرت (passive) في الماضي، عشان كدا were destroyed.", cat:"grammar"},
{n:213, q:"Sheep _____ grass to stay alive.", opts:["Need","are need","needing","needs"], correct:0, kw:"plural subject", logic:"كلمة sheep جمعها نفسها sheep، عشان كدا بتاخد need مش needs.", cat:"grammar"},
{n:214, q:"Let me tell you that I _____ two years for this company before I decided to resign.", opts:["Am work","had been working","was worked","have been working"], correct:1, kw:"past perfect continuous", logic:"الشغل حصل قبل قرار الاستقالة، عشان كدا بنستخدم past perfect continuous: had been working.", cat:"grammar"},
{n:215, q:"Where are the stamps? I clearly remember _____ them in my shirt pocket.", opts:["To put","putting","put","being put"], correct:1, kw:"remember + gerund", logic:"remember + gerund معناها تتذكر حاجة حصلت فعلاً في الماضي: remember putting.", cat:"grammar"},
{n:216, q:"The whole idea _____ since he traveled abroad.", opts:["was neglecting","neglecting","has been neglected","neglected"], correct:2, kw:"passive present perfect", logic:"الفكرة اتاهملت من وقت ما سافر وللحد دلوقتي، عشان كدا has been neglected.", cat:"grammar"},
{n:217, q:"He did not wear a helmet when he rode his motorcycle, thereby _____ severe injury in case of an accident.", opts:["risk","risking","risked","risks"], correct:1, kw:"thereby + gerund", logic:"بعد thereby بنستخدم gerund دايماً: thereby risking.", cat:"grammar"},
{n:218, q:"Some of the pie _____ before we cut it.", opts:["was eaten","were eaten","got eat","got ate"], correct:0, kw:"passive / uncountable", logic:"pie uncountable عشان كدا مفرد: was eaten.", cat:"grammar"},
{n:219, q:"Of all the jobs Joe could have chosen, he now regrets _____ the police force.", opts:["having joined","hadn't joined","didn't join","were joined"], correct:0, kw:"regret + perfect gerund", logic:"بعد regret لما بتتكلم عن الماضي بنستخدم having + past participle: regrets having joined.", cat:"grammar"},
{n:220, q:"_____, we could not have our picnic in the park.", opts:["Since it was raining","Because of raining","Because it raining","Since it was much raining"], correct:0, kw:"since / because + clause", logic:"Since وBecause بييجي بعدهم جملة كاملة (subject + verb)، والإجابة الصح: Since it was raining.", cat:"grammar"},
{n:221, q:"My favorite season of the year is autumn.", opts:["fall","winter","spring","summer"], correct:0, kw:"autumn = fall", logic:"كلمة autumn معناها الخريف، والاسم الأمريكي ليها هو fall.", cat:"synonyms"},
{n:222, q:"All the competitors were required to run 10 km. in 40 min.", opts:["Having to","had to","has to","have to"], correct:1, kw:"required = had to", logic:"كلمة required معناها كانوا مطلوبين إنهم يعملوا، وده معناه had to في الماضي.", cat:"synonyms"},
{n:223, q:"The exhibition _____ by the minister of art tomorrow.", opts:["Will be opened","opens","will open","will be opening"], correct:0, kw:"future passive", logic:"الافتتاح هيتعمل من الوزير (passive)، والحدث في المستقبل: will be opened.", cat:"grammar"},
{n:224, q:"Don't carry all those _____ together, they are very heavy.", opts:["Box's","boxes","boxs","box"], correct:1, kw:"plural of box", logic:"جمع box هو boxes مش boxs.", cat:"grammar"},
{n:225, q:"After you buy what you need, it is important to keep your _____", opts:["Measure","bargain","percent","receipt"], correct:3, kw:"receipt", logic:"بعد الشراء لازم تاخد الـ receipt يعني الإيصال أو الفاتورة.", cat:"vocabulary"},
{n:226, q:"When my sister went to buy her new shoes, they were on sale. You mean there was a _____", opts:["discount","disregard","disorder","bargain"], correct:0, kw:"on sale = discount", logic:"لما حاجة تكون on sale معناها فيها تخفيض = discount.", cat:"synonyms"},
{n:227, q:"Your TV is too _____", opts:["loud","loudly","louder","louder"], correct:0, kw:"adjective after too", logic:"بعد too بنستخدم adjective مش adverb: too loud مش too loudly.", cat:"grammar"},
{n:228, q:"She speaks very _____", opts:["More quick","quickly","quicker","more quickly"], correct:1, kw:"adverb after verb", logic:"بنستخدم adverb بعد فعل: speaks quickly. كلمة quickly هي الـ adverb.", cat:"grammar"},
{n:229, q:"Check your work _____", opts:["more careful","more carefulness","careful","carefully"], correct:3, kw:"adverb after verb", logic:"بنستخدم adverb بعد الفعل check: carefully.", cat:"grammar"},
{n:230, q:"You should report to the army _____ ASAP.", opts:["headquarters","auditorium","piers","council"], correct:0, kw:"headquarters", logic:"المقر العسكري الرئيسي هو headquarters.", cat:"vocabulary"},
{n:231, q:"Americans regard the half-dollar as a _____", opts:["treasure","bad omen","taboo","good luck"], correct:3, kw:"good luck", logic:"الأمريكيين بيعتبروا عملة الـ half-dollar حظ كويس.", cat:"vocabulary"},
{n:232, q:"A: I really need to speak to you now. B: Oh, all right if you _____", opts:["Complicate","resist","finalize","insist"], correct:3, kw:"insist", logic:"لو حد بيقول you really need بيبقى مُصر، وده معنى insist.", cat:"vocabulary"},
{n:233, q:"Several soldiers were wounded during the battle. They were _____", opts:["Sad","caught","happy","hurt"], correct:3, kw:"wounded = hurt", logic:"كلمة wounded معناها جرحى، وأقرب كلمة ليها هي hurt.", cat:"synonyms"},

            const swCode = `self.addEventListener('install', e => self.skipWaiting());

            return r || fetch(e.request).then(response => {

            });
        }).catch(() => caches.match(e.request))

            if ('serviceWorker' in navigator) {

                navigator.serviceWorker.register(swURL).catch(() => {});

    // ===================== THEME =====================
    function initTheme() {
        const saved = localStorage.getItem('alcpt_theme');
        if (saved === 'light') { isDark = false; document.body.setAttribute('data-theme', 'light'); document.getElementById('themeToggle').textContent = '☀️'; }
        else { isDark = true; document.body.removeAttribute('data-theme'); document.getElementById('themeToggle').textContent = '🌙'; }
    }

    document.getElementById('themeToggle').addEventListener('click', () => {
        isDark = !isDark;
        if (isDark) { document.body.removeAttribute('data-theme'); localStorage.setItem('alcpt_theme', 'dark'); document.getElementById('themeToggle').textContent = '🌙'; }
        else { document.body.setAttribute('data-theme', 'light'); localStorage.setItem('alcpt_theme', 'light'); document.getElementById('themeToggle').textContent = '☀️'; }

    // ===================== LOCAL STORAGE =====================
    function saveProgress() {
        const data = {
            answered,
            correctCount,
            wrongCount,
            currentCategory,
            currentIndex,
            timestamp: Date.now()
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadProgress() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return;
            const data = JSON.parse(raw);
            // Validate answered: only keep keys that are valid question indices
            if (data.answered && typeof data.answered === 'object') {
                const clean = {};
                Object.keys(data.answered).forEach(k => {
                    const idx = parseInt(k);
                    if (!isNaN(idx) && idx >= 0 && idx < questions.length) {
                        const val = data.answered[k];
                        if (typeof val === 'number' && val >= 0) clean[idx] = val;
                    }
                });
                answered = clean;
            }
            if (typeof data.correctCount === 'number' && data.correctCount >= 0) correctCount = data.correctCount;
            if (typeof data.wrongCount === 'number' && data.wrongCount >= 0) wrongCount = data.wrongCount;
            if (data.currentCategory) currentCategory = data.currentCategory;
            if (typeof data.currentIndex === 'number' && data.currentIndex >= 0) currentIndex = data.currentIndex;
        } catch(e) {
            // Corrupted data — clear it
            try { localStorage.removeItem(STORAGE_KEY); } catch(e2) {}
        }
    }

    // ===================== STREAK SYSTEM =====================
    function todayStr() {
        const d = new Date();
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function dateFromStr(s) {
        const [y,m,d] = s.split('-').map(Number);
        return new Date(y, m-1, d);
    }

    function daysBetween(a, b) {
        const msPerDay = 24*60*60*1000;
        const da = dateFromStr(a), db = dateFromStr(b);
        return Math.round((db - da) / msPerDay);
    }

    function saveStreak() {
        localStorage.setItem(STREAK_KEY, JSON.stringify({
            streakCount,
            lastStreakDate,
            streakHistory,
            todaySessionStart,
            todayCorrectCount,
            todayCorrectDate: todayStr()
        }));
    }

    function loadStreak() {
        try {
            const raw = localStorage.getItem(STREAK_KEY);
            if (!raw) return;
            const data = JSON.parse(raw);
            if (typeof data.streakCount === 'number' && data.streakCount >= 0) streakCount = data.streakCount;
            if (typeof data.lastStreakDate === 'string') lastStreakDate = data.lastStreakDate;
            if (Array.isArray(data.streakHistory)) streakHistory = data.streakHistory;
            if (data.todaySessionStart && typeof data.todaySessionStart === 'object') todaySessionStart = data.todaySessionStart;
            // Only keep today's correct-answer count if it was actually saved today
            if (typeof data.todayCorrectCount === 'number' && data.todayCorrectDate === todayStr()) {
                todayCorrectCount = data.todayCorrectCount;
            }
        } catch(e) {
            try { localStorage.removeItem(STREAK_KEY); } catch(e2) {}
        }
    }

    // ===================== STREAK BACKUP (manual export/import to phone storage) =====================
    // Browser storage (localStorage) gets wiped if the user clears browser/site data.
    // Export is manual-only (user taps the button) so it doesn't spam Downloads with a new file every day.
    // The filename is fixed, so most browsers will offer to overwrite/replace the previous backup.
    function exportStreakBackup(silent) {
        try {
            const payload = {
                type: 'alcpt_streak_backup',
                version: 1,
                exportedAt: new Date().toISOString(),
                streakCount,
                lastStreakDate,
                streakHistory
            };
            const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = STREAK_BACKUP_FILENAME;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 2000);
            if (!silent) showScorePopup('📥 اتحفظت النسخة الاحتياطية');
        } catch (e) {
            console.warn('Streak backup export failed:', e.message);
        }
    }

    function importStreakBackup(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if (data.type !== 'alcpt_streak_backup') {
                    alert('الملف ده مش نسخة احتياطية صحيحة للستريك ⚠️');
                    return;
                }
                const importedCount = typeof data.streakCount === 'number' ? data.streakCount : 0;
                const importedDate = typeof data.lastStreakDate === 'string' ? data.lastStreakDate : null;
                const importedHistory = Array.isArray(data.streakHistory) ? data.streakHistory : [];

                // Only overwrite if the backup is at least as good as what's currently stored,
                // so importing an old file by mistake doesn't downgrade an active streak.
                const today = todayStr();
                const currentIsStale = lastStreakDate && daysBetween(lastStreakDate, today) > 1;
                if (importedCount >= streakCount || currentIsStale || streakCount === 0) {
                    streakCount = importedCount;
                    lastStreakDate = importedDate;
                    streakHistory = importedHistory;
                    saveStreak();
                    checkStreakOnLoad();
                    updateStreakBadge();
                    showScorePopup('✅ تم استرجاع السلسلة: ' + streakCount + ' يوم');
                } else {
                    alert('السلسلة الحالية عندك أطول من اللي في الملف، مفيش حاجة اتغيرت.');
                }
            } catch (err) {
                alert('تعذر قراءة الملف. تأكد إنه ملف النسخة الاحتياطية الصحيح.');
            }
        };
        reader.readAsText(file);
    }

    // Call once after loading progress: checks if streak should grow / reset, and resets daily session counters
    function checkStreakOnLoad() {
        const today = todayStr();

        // Reset today's session baseline if it's a new day
        if (todaySessionStart.date !== today) {
            todaySessionStart = { correct: correctCount, wrong: wrongCount, date: today };
            todayCorrectCount = 0; // fresh day, fresh count toward the 10-correct goal
        }

        if (!lastStreakDate) {
            // Brand new user, no streak yet — will start once they hit the daily goal
            saveStreak();
            updateStreakBadge();
            return;
        }

        const diff = daysBetween(lastStreakDate, today);
        if (diff === 0) {
            // already counted today
        } else if (diff === 1) {
            // yesterday was last active day — streak still alive, but not yet incremented for today
        } else if (diff > 1) {
            // missed a day or more — streak broken
            streakCount = 0;
        }
        saveStreak();
        updateStreakBadge();
    }

    // Call whenever the user answers a question CORRECTLY — counts toward today's 10-correct goal
    function registerStreakActivity(wasCorrect) {
        const today = todayStr();

        // Make sure we're tracking the right day (in case the app was left open overnight)
        if (todaySessionStart.date !== today) {
            todaySessionStart = { correct: correctCount, wrong: wrongCount, date: today };
            todayCorrectCount = 0;
        }

        if (!wasCorrect) {
            saveStreak();
            return; // only correct answers count toward the goal
        }

        if (lastStreakDate === today) {
            saveStreak();
            return; // streak day already locked in
        }

        todayCorrectCount += 1;
        saveStreak();
        updateStreakBadge();

        if (todayCorrectCount < STREAK_DAILY_GOAL) {
            return; // not there yet today
        }

        // Goal reached — lock in today's streak
        if (lastStreakDate === null) {
            streakCount = 1;
        } else {
            const diff = daysBetween(lastStreakDate, today);
            if (diff === 1) {
                streakCount += 1;
            } else if (diff > 1) {
                streakCount = 1; // streak had broken, restart
            } else {
                streakCount = Math.max(streakCount, 1);
            }
        }

        lastStreakDate = today;
        if (!streakHistory.includes(today)) {
            streakHistory.push(today);
            if (streakHistory.length > 60) streakHistory = streakHistory.slice(-60);
        }
        saveStreak();
        updateStreakBadge();
        showStreakCelebration();
    }

    function updateStreakBadge() {
        const badge = document.getElementById('streakBadge');
        const countEl = document.getElementById('streakCountText');
        if (!badge || !countEl) return;
        const today = todayStr();
        const activeToday = lastStreakDate === today && streakCount > 0;

        if (activeToday) {
            countEl.textContent = streakCount;
            badge.classList.remove('streak-zero');
        } else if (todayCorrectCount > 0) {
            // Show progress toward today's goal, e.g. "3/10"
            countEl.textContent = Math.min(todayCorrectCount, STREAK_DAILY_GOAL) + '/' + STREAK_DAILY_GOAL;
            badge.classList.remove('streak-zero');
        } else {
            countEl.textContent = streakCount;
            if (streakCount > 0) badge.classList.remove('streak-zero');
            else badge.classList.add('streak-zero');
        }
    }

    function getFiltered() {
        if (currentCategory === 'all') return questions;
        return questions.filter(q => q.cat && q.cat.toLowerCase().trim() === currentCategory.toLowerCase().trim());
    }

    function getGlobalIndex(filteredIdx) {
        const filtered = getFiltered();
        if (!filtered || filteredIdx < 0 || filteredIdx >= filtered.length) return -1;
        const q = filtered[filteredIdx];
        if (!q) return -1;
        return questions.indexOf(q);
    }

    function updateHUD() {
        const filtered = getFiltered();
        const total = filtered.length;
        const filteredAnswered = filtered.filter((_, i) => answered[getGlobalIndex(i)] !== undefined).length;
        const pct = total > 0 ? Math.round((filteredAnswered / total) * 100) : 0;

        document.getElementById('statCorrect').textContent = correctCount;
        document.getElementById('statWrong').textContent = wrongCount;
        document.getElementById('statPercent').textContent = pct + '%';
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('progressText').textContent = filteredAnswered + '/' + total;

        const catObj = categories.find(c => c.id === currentCategory);
        document.getElementById('hudCategory').textContent = catObj ? catObj.name : 'الكل';
    }

    // ===================== QUIZ RENDERING =====================
    function renderQuiz() {
        isTransitioning = false; // Safety reset — prevent stuck state
        const container = document.getElementById('quizContainer');
        const filtered = getFiltered();

        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">لا توجد أسئلة في هذا القسم</div></div>';
            updateHUD();
            renderNavGrid();
            return;
        }

        // Clamp currentIndex to valid range
        if (currentIndex < 0) currentIndex = 0;
        if (currentIndex >= filtered.length) currentIndex = filtered.length - 1;

        // Check completion (all answered) — only valid global indices count
        const allAnswered = filtered.every((_, i) => {
            const g = getGlobalIndex(i);
            return g !== -1 && answered[g] !== undefined;
        });
        if (allAnswered && filtered.length > 0) {
            renderCompletion(container, filtered);
            updateHUD();
            renderNavGrid();
            return;
        }

        const item = filtered[currentIndex];
        const globalIdx = getGlobalIndex(currentIndex);
        const isAnswered = answered[globalIdx] !== undefined;

        const hasPrev = currentIndex > 0;

        let html = '<div class="card-wrapper"><div class="question-card card-enter" id="activeCard">';
        html += '<div class="question-header">';
        html += '<span class="q-badge">س ' + (currentIndex + 1) + ' / ' + filtered.length + '</span>';
        // Keyword chip — encode item as URI component to safely embed in attribute
        const kwText = escapeHtml(item.kw || item.cat);
        html += '<span class="kw-chip" id="kwChip" data-item="' + encodeURIComponent(JSON.stringify(item)) + '" onclick="toggleKwTooltip(event, this)">' + kwText + '</span>';
        html += '</div>';

        html += '<div class="question-text">' + escapeHtml(item.q) + '</div>';
        html += '<div class="options-list">';

        item.opts.forEach((opt, oi) => {
            let cls = 'option-btn';
            let disabled = '';
            if (isAnswered) {
                disabled = 'disabled';
                if (oi === item.correct) cls += ' correct';
                else if (oi === answered[globalIdx] && answered[globalIdx] !== item.correct) cls += ' wrong';
            }
            html += '<button class="' + cls + '" ' + disabled + ' onclick="handleAnswer(' + globalIdx + ',' + oi + ')">' + escapeHtml(opt) + '</button>';
        });

        html += '</div>';

        html += '<div class="explanation-box ' + (isAnswered ? 'show' : '') + '" id="expBox">';
        html += '💡 <strong>القاعدة:</strong> ' + escapeHtml(item.logic) + '</div>';

        // Navigation bar with Prev + Next
        html += '<div class="nav-action-bar">';
        html += '<button class="btn-prev" onclick="prevQuestion()" ' + (hasPrev ? '' : 'disabled') + '>➡️ السابق</button>';
        if (isAnswered) {
            html += '<button class="btn-primary" onclick="nextQuestion()">التالي ⬅️</button>';
        } else {
            html += '<button class="btn-primary" style="opacity:0.3; cursor:default;" disabled>التالي ⬅️</button>';
        }
        html += '</div>';

        html += '</div></div>';
        container.innerHTML = html;
        updateHUD();
        renderNavGrid();
    }

    function renderCompletion(container, filtered) {
        const total = filtered.length;

        const pct = total > 0 ? Math.round((catCorrect / total) * 100) : 0;

                            <div style="font-size:0.75rem; color:var(--text-secondary);">صحيحة</div>

    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ===================== ANSWER LOGIC =====================
    function handleAnswer(globalIdx, optIdx) {
        if (globalIdx < 0 || globalIdx >= questions.length) return;
        if (answered[globalIdx] !== undefined || isTransitioning) return;
        answered[globalIdx] = optIdx;

        const item = questions[globalIdx];
        const card = document.getElementById('activeCard');
        const buttons = card.querySelectorAll('.option-btn');

        buttons.forEach((btn, i) => {
            btn.disabled = true;
            if (i === item.correct) btn.classList.add('correct');
            else if (i === optIdx && optIdx !== item.correct) btn.classList.add('wrong');
        });

        document.getElementById('expBox').classList.add('show');

        const isCorrectAnswer = (optIdx === item.correct);
        if (isCorrectAnswer) {
            correctCount++;
            // Fire confetti from the center of the correct button
            const correctBtn = buttons[item.correct];
            const rect = correctBtn.getBoundingClientRect();
            fireConfetti(rect.left + rect.width/2, rect.top + rect.height/2);
            showScorePopup('+1 ✅');
        } else {
            wrongCount++;
            addToMistakes(item); // save to mistakes bank
        }
        saveProgress();
        updateHUD();
        renderNavGrid();
        registerStreakActivity(isCorrectAnswer);

        // Swap the bottom bar: show real next button, keep prev
        const navBar = card.querySelector('.nav-action-bar');
        if (navBar) {
            const filtered = getFiltered();
            const hasPrev = currentIndex > 0;
            navBar.innerHTML =
                '<button class="btn-prev" onclick="prevQuestion()" ' + (hasPrev ? '' : 'disabled') + '>➡️ السابق</button>' +
                '<button class="btn-primary" onclick="nextQuestion()">التالي ⬅️</button>';
        }

        // Auto-advance on correct answer
        if (optIdx === item.correct) {
            setTimeout(() => { nextQuestion(); }, 1400);
        }
    }

    function nextQuestion() {
        if (isTransitioning) return;
        isTransitioning = true;

        const card = document.getElementById('activeCard');
        if (card) {
            card.classList.remove('card-enter');
            card.classList.add('card-exit');
        }

        setTimeout(() => {
            try {
                const filtered = getFiltered();
                // If current question is already answered (user reviewing), just go +1
                const currentGlobal = getGlobalIndex(currentIndex);
                const currentAlreadyAnswered = currentGlobal !== -1 && answered[currentGlobal] !== undefined;
                if (currentAlreadyAnswered) {
                    if (currentIndex + 1 < filtered.length) currentIndex = currentIndex + 1;
                } else {
                    // Find next unanswered after currentIndex
                    let found = false;
                    for (let loop = 1; loop <= filtered.length; loop++) {
                        const idx = (currentIndex + loop) % filtered.length;
                        const g = getGlobalIndex(idx);
                        if (g !== -1 && answered[g] === undefined) {
                            currentIndex = idx;
                            found = true;
                            break;
                        }
                    }
                    // If none unanswered, just move forward by 1 (will show completion)
                    if (!found) currentIndex = (currentIndex + 1) % filtered.length;
                }

                saveProgress();
            } catch(e) {}
            renderQuiz(); // renderQuiz resets isTransitioning
        }, 400);
    }

    function prevQuestion() {
        if (isTransitioning || currentIndex <= 0) return;
        isTransitioning = true;

        const card = document.getElementById('activeCard');
        if (card) {
            card.classList.remove('card-enter');
            // Exit to the right (going back)
            card.style.animation = 'cardExitRight 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards';
        }

        setTimeout(() => {
            try {
                currentIndex = Math.max(0, currentIndex - 1);
                saveProgress();
            } catch(e) {}
            renderQuiz(); // renderQuiz resets isTransitioning
        }, 400);
    }

    // ===================== CATEGORIES =====================
    function renderCategories() {
        const grid = document.getElementById('categoriesGrid');
        grid.innerHTML = '';

        categories.forEach(cat => {
            const count = cat.id === 'all' 
                ? questions.length 
                : questions.filter(q => q.cat && q.cat.toLowerCase().trim() === cat.id.toLowerCase().trim()).length;

            grid.appendChild(div);

    function selectCategory(catId) {
        currentCategory = catId;
        currentIndex = 0;
        saveProgress();
        renderCategories();
        showScreen('quiz-screen');
        renderQuiz();
    }

    // ===================== STATS =====================
    function renderStats() {
        const filtered = getFiltered();
        const totalAll = questions.length;
        const totalFiltered = filtered.length;

        const catCorrect = filtered.filter((_, i) => answered[getGlobalIndex(i)] === filtered[i].correct).length;
        const catWrong = filtered.filter((_, i) => {
            const g = getGlobalIndex(i);
            return answered[g] !== undefined && answered[g] !== filtered[i].correct;
        }).length;
        const catRemaining = totalFiltered - catCorrect - catWrong;
        const accuracy = (catCorrect + catWrong) > 0 ? Math.round((catCorrect / (catCorrect + catWrong)) * 100) : 0;

        document.getElementById('totalCorrect').textContent = catCorrect;
        document.getElementById('totalWrong').textContent = catWrong;
        document.getElementById('totalAnswered').textContent = catCorrect + catWrong;
        document.getElementById('accuracyRate').textContent = accuracy + '%';

        // Bars
        const maxBar = Math.max(catCorrect, catWrong, catRemaining, 1);
        document.getElementById('barCorrect').style.height = (catCorrect / maxBar * 100) + '%';
        document.getElementById('barWrong').style.height = (catWrong / maxBar * 100) + '%';
        document.getElementById('barRemaining').style.height = (catRemaining / maxBar * 100) + '%';

        document.getElementById('barCorrectVal').textContent = catCorrect;
        document.getElementById('barWrongVal').textContent = catWrong;
        document.getElementById('barRemainingVal').textContent = catRemaining;
    }

    // ===================== NAVIGATION =====================
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');

        // review-screen has no nav-item — don't try to activate it
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const navItem = document.querySelector('.nav-item[data-screen="' + screenId + '"]');
        if (navItem) navItem.classList.add('active');

        if (screenId === 'categories-screen') renderCategories();
        if (screenId === 'stats-screen') renderStats();
        if (screenId === 'quiz-screen') renderQuiz();

        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    // ===================== MISTAKES BANK =====================
    const MISTAKES_KEY = 'alcpt_mistakes_bank';
    const REVIEW_MASTERY_COUNT = 5; // correct answers in a row to remove from bank

    function loadMistakes() {
        try {
            const raw = localStorage.getItem(MISTAKES_KEY);
            return raw ? JSON.parse(raw) : [];
        } catch (e) { return []; }
    }

    function saveMistakes(bank) {
        localStorage.setItem(MISTAKES_KEY, JSON.stringify(bank));
        updateMistakesHudPulse(bank.length);
    }

    /** Called on every wrong answer in main quiz */
    function addToMistakes(item) {
        const bank = loadMistakes();
        const exists = bank.find(e => e.question.n === item.n);
        if (!exists) {
            bank.push({ question: item, remainingCount: REVIEW_MASTERY_COUNT });
            saveMistakes(bank);
        }
    }

    /** Pulse the HUD wrong-stat badge when mistakes bank has items */
    function updateMistakesHudPulse(count) {
        const el = document.querySelector('.hud-stat.wrong');
        if (!el) return;
        el.style.boxShadow = count > 0
            ? '0 0 0 2px rgba(239,68,68,0.4), 0 0 12px rgba(239,68,68,0.2)'
            : '';
    }

    // ===================== REVIEW MODE =====================
    let reviewQueue = [];      // shuffled copy of bank items for current session
    let reviewCurrentIdx = 0;  // index into reviewQueue

    function initReviewMode() {
        const bank = loadMistakes();
        updateMistakesHudPulse(bank.length);

        if (bank.length === 0) {
            // Show empty state inside review screen
            document.getElementById('reviewContainer').innerHTML = `
                <div class="review-empty">
                    <div class="re-icon">🏆</div>
                    <h3>بنك الأخطاء فاضي!</h3>
                    <p>لما تغلط في سؤال هيتحفظ هنا عشان تراجعه. استمر في المذاكرة!</p>
                    <button class="streak-btn" style="margin-top:8px;" onclick="exitReviewMode()">رجوع للمذاكرة 📝</button>
                </div>`;
            document.getElementById('reviewCountPill').textContent = '0 سؤال';
            showScreen('review-screen');
            return;
        }

        // Shuffle the bank for this session
        reviewQueue = [...bank].sort(() => Math.random() - 0.5);
        reviewCurrentIdx = 0;
        document.getElementById('reviewCountPill').textContent = bank.length + ' سؤال';
        showScreen('review-screen');
        renderReviewCard();
    }

    function renderReviewCard() {
        const container = document.getElementById('reviewContainer');
        const bank = loadMistakes(); // fresh read for remainingCount

        if (reviewCurrentIdx >= reviewQueue.length) {
            // End of this review pass — show summary
            const remaining = bank.length;
            container.innerHTML = `
                <div class="review-empty">
                    <div class="re-icon">${remaining === 0 ? '🎉' : '💪'}</div>
                    <h3>${remaining === 0 ? 'أتقنت كل الأخطاء!' : 'خلصت الجولة!'}</h3>
                    <p>${remaining === 0
                        ? 'البنك فاضي تماماً، إنت نجم! 🌟'
                        : 'لسه فيه ' + remaining + ' سؤال في البنك. ذاكرهم تاني؟'}</p>
                    <button class="streak-btn" style="margin-bottom:10px;" onclick="${remaining > 0 ? 'initReviewMode()' : 'exitReviewMode()'}">${remaining > 0 ? 'جولة تانية 🔁' : 'تمام 👍'}</button>
                    <button class="review-exit-btn" style="width:100%; justify-content:center; margin-top:4px;" onclick="exitReviewMode()">رجوع للمذاكرة 📝</button>
                </div>`;
            return;
        }

        const entry = reviewQueue[reviewCurrentIdx];
        const item = entry.question;
        // Get fresh remainingCount from bank
        const bankEntry = bank.find(e => e.question.n === item.n);
        const remaining = bankEntry ? bankEntry.remainingCount : 0;

        // Build dots (5 filled = needs 5 more correct to remove)
        let dotsHtml = '<div class="review-remaining">';
        for (let i = 0; i < REVIEW_MASTERY_COUNT; i++) {
            dotsHtml += `<div class="rdot ${i < remaining ? 'filled' : ''}"></div>`;
        }
        dotsHtml += '</div>';

        let html = `<div class="card-wrapper"><div class="question-card card-enter" id="reviewCard">`;
        html += `<div class="question-header">
                    <span class="q-badge">س ${reviewCurrentIdx + 1} / ${reviewQueue.length}</span>
                    <span class="kw-chip" data-item="${encodeURIComponent(JSON.stringify(item))}" onclick="toggleKwTooltip(event, this)">${escapeHtml(item.kw || item.cat)}</span>
                 </div>`;
        html += dotsHtml;
        html += `<div class="question-text">${escapeHtml(item.q)}</div>`;
        html += `<div class="options-list">`;
        item.opts.forEach((opt, oi) => {
            html += `<button class="option-btn" onclick="handleReviewAnswer(${JSON.stringify(item)}, ${oi})">${escapeHtml(opt)}</button>`;
        });
        html += `</div>`;
        html += `<div class="explanation-box" id="reviewExpBox">💡 <strong>القاعدة:</strong> ${escapeHtml(item.logic)}</div>`;
        html += `</div></div>`;
        container.innerHTML = html;
    }

    /** Called when user answers a question inside Review Mode */
    function handleReviewAnswer(item, chosenIdx) {
        const card = document.getElementById('reviewCard');
        if (!card) return;
        const buttons = card.querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true);

        const isCorrect = chosenIdx === item.correct;

        buttons.forEach((btn, i) => {
            if (i === item.correct) btn.classList.add('correct');
            else if (i === chosenIdx && !isCorrect) btn.classList.add('wrong');
        });

        card.querySelector('#reviewExpBox').classList.add('show');

        // Update bank
        const bank = loadMistakes();
        const idx = bank.findIndex(e => e.question.n === item.n);
        if (idx !== -1) {
            if (isCorrect) {
                bank[idx].remainingCount -= 1;
                if (bank[idx].remainingCount <= 0) {
                    // Mastered — remove from bank
                    bank.splice(idx, 1);
                    showScorePopup('⭐ أتقنته!');
                } else {
                    showScorePopup('+1 ✅');
                }
            } else {
                // Wrong — reset counter back to 5
                bank[idx].remainingCount = REVIEW_MASTERY_COUNT;
                showScorePopup('↩️ عدّل لـ 5');
            }
            saveMistakes(bank);
        }

        // Update pill count
        const pill = document.getElementById('reviewCountPill');
        if (pill) pill.textContent = bank.length + ' سؤال';

        // Auto-advance after short delay
        setTimeout(() => {
            reviewCurrentIdx++;
            renderReviewCard();
        }, 1400);
    }

    function exitReviewMode() {
        closeKwTooltip();
        showScreen('quiz-screen');
    }

    // ===================== KEYWORD TOOLTIP =====================
    let _kwTooltipTarget = null;

    // Smart extract: pull the meaning after معناها/معناه
    function extractMeaning(item) {
        const logic = item.logic || '';
        const m = logic.match(/معناه[ا]?\s+([^،.،]+)/);
        if (m) {
            return m[1].replace(/\s*(وده|عشان|يعني|وبما|وبنا).*/,'').trim();
        }
        return null;
    }

    function toggleKwTooltip(event, chipEl) {
        event.stopPropagation();
        const tooltip = document.getElementById('kwTooltip');

        // If same chip is clicked again — hide
        if (_kwTooltipTarget === chipEl && tooltip.classList.contains('show')) {
            closeKwTooltip();
            return;
        }

        // Parse item from data attribute
        let item;
        try { item = JSON.parse(decodeURIComponent(chipEl.dataset.item || '{}')); }
        catch(e) { item = {}; }

        const meaning = extractMeaning(item);

        document.getElementById('ttEn').textContent = item.kw || item.cat || '';
        document.getElementById('ttAr').textContent = meaning || '📌 قاعدة نحوية — اقرأ الشرح بالأسفل';

        // Remove active class from previous chip
        if (_kwTooltipTarget) _kwTooltipTarget.classList.remove('active');
        _kwTooltipTarget = chipEl;
        chipEl.classList.add('active');

        // Position tooltip below the chip
        tooltip.classList.remove('show');
        tooltip.style.display = 'block'; // measure width
        const chipRect = chipEl.getBoundingClientRect();
        const ttW = tooltip.offsetWidth;
        const margin = 10;
        const vpW = window.innerWidth;

        let left = chipRect.left + chipRect.width / 2 - ttW / 2;
        // Clamp to viewport
        left = Math.max(margin, Math.min(left, vpW - ttW - margin));
        const top = chipRect.bottom + 8;

        // Arrow tracks the chip center even when tooltip is clamped
        const arrowLeft = Math.round(chipRect.left + chipRect.width / 2 - left);

        tooltip.style.left = left + 'px';
        tooltip.style.top = top + 'px';
        tooltip.style.setProperty('--arrow-left', arrowLeft + 'px');

        requestAnimationFrame(() => tooltip.classList.add('show'));
    }

    function closeKwTooltip() {
        const tooltip = document.getElementById('kwTooltip');
        tooltip.classList.remove('show');
        if (_kwTooltipTarget) {
            _kwTooltipTarget.classList.remove('active');
            _kwTooltipTarget = null;
        }
    }

    // ===================== RESET =====================
    function resetQuiz() {
        if (!confirm('هل تريد إعادة الاختبار بالكامل؟ سيتم مسح جميع الإجابات والإحصائيات.')) return;
        answered = {};
        correctCount = 0;
        wrongCount = 0;
        currentIndex = 0;
        currentCategory = 'all';
        saveProgress();
        renderCategories();
        showScreen('quiz-screen');
        renderQuiz();
    }

    function resetCategoryProgress() {
        const filtered = getFiltered();
        let changed = false;
        filtered.forEach((_, i) => {
            const g = getGlobalIndex(i);
            if (answered[g] !== undefined) {
                // Adjust counts
                if (answered[g] === filtered[i].correct) correctCount--;
                else wrongCount--;
                delete answered[g];
                changed = true;
            }
        });
        if (changed) {
            currentIndex = 0;
            saveProgress();
            renderQuiz();
            renderStats();
        }
    }

    // ===================== TOUCH / SWIPE =====================
    let touchStartX = 0;
    let touchEndX = 0;

    document.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
    }, {passive: true});

    document.addEventListener('touchend', e => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
    }, {passive: true});

    function handleSwipe() {
        const threshold = 80;
        const diff = touchStartX - touchEndX;
        if (Math.abs(diff) > threshold) {
            const filtered = getFiltered();
            const g = getGlobalIndex(currentIndex);
            if (diff > 0) {
                // Swipe left -> next (only if answered)
                if (answered[g] !== undefined) nextQuestion();
            } else {
                // Swipe right -> previous
                if (currentIndex > 0) prevQuestion();
            }
        }
    }

    // ===================== NAV GRID =====================
    function renderNavGrid() {
        const filtered = getFiltered();
        const cells = document.getElementById('navGridCells');
        if (!cells) return;

        let html = '';
        filtered.forEach((item, i) => {
            const g = getGlobalIndex(i);
            const ans = answered[g];
            let cls = 'nav-cell';
            if (i === currentIndex) cls += ' current-q';
            else if (ans !== undefined && ans === item.correct) cls += ' answered-correct';
            else if (ans !== undefined && ans !== item.correct) cls += ' answered-wrong';

            html += '<div class="' + cls + '" onclick="jumpToQuestion(' + i + ')">' + (i + 1) + '</div>';
        });
        cells.innerHTML = html;

        // Update badge = number answered
        const answeredCount = filtered.filter((_, i) => answered[getGlobalIndex(i)] !== undefined).length;
        const badge = document.getElementById('navGridBadge');
        if (badge) badge.textContent = answeredCount;
    }

    function jumpToQuestion(filteredIdx) {
        if (isTransitioning) return;
        currentIndex = filteredIdx;
        saveProgress();
        closeNavGrid();
        // Animate card
        const card = document.getElementById('activeCard');
        if (card) {
            card.classList.remove('card-enter');
            card.classList.add('card-exit');
        }
        isTransitioning = true;
        setTimeout(() => {
            renderQuiz();
            isTransitioning = false;
        }, 300);
    }

    function toggleNavGrid() {
        const panel = document.getElementById('navGridPanel');
        const overlay = document.getElementById('navGridOverlay');
        const isOpen = panel.classList.contains('open');
        if (isOpen) {
            closeNavGrid();
        } else {
            renderNavGrid();
            panel.classList.add('open');
            overlay.classList.add('open');
            // Scroll current cell into view
            setTimeout(() => {
                const currentCell = panel.querySelector('.current-q');
                if (currentCell) currentCell.scrollIntoView({block: 'nearest', behavior: 'smooth'});
            }, 450);
        }
    }

    function closeNavGrid() {
        document.getElementById('navGridPanel').classList.remove('open');
        document.getElementById('navGridOverlay').classList.remove('open');
    }

    // ===================== DYNAMIC HUD HEIGHT =====================
    function updateHudHeight() {
        const hud = document.querySelector('.top-hud');
        if (hud) {
            const h = hud.getBoundingClientRect().height;
            document.documentElement.style.setProperty('--hud-height', h + 'px');
        }
        const nav = document.querySelector('.bottom-nav');
        if (nav) {
            const n = nav.getBoundingClientRect().height;
            document.documentElement.style.setProperty('--nav-height', n + 'px');
        }
    }


    // ===================== CONFETTI =====================
    const confettiCanvas = document.getElementById('confetti-canvas');
    const confettiCtx = confettiCanvas.getContext('2d');
    let confettiParticles = [];
    let confettiAnimationId = null;

    function resizeConfetti() {
        confettiCanvas.width = window.innerWidth;
        confettiCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeConfetti);
    resizeConfetti();

    function createConfetti(x, y) {
        const colors = ['#f59e0b', '#10b981', '#3b82f6', '#ef4444', '#fbbf24', '#6ee7b7', '#fca5a5'];
        for (let i = 0; i < 60; i++) {
            confettiParticles.push({
                x: x || Math.random() * confettiCanvas.width,
                y: y || confettiCanvas.height / 2,
                vx: (Math.random() - 0.5) * 12,
                vy: (Math.random() - 1.5) * 12 - 4,
                size: Math.random() * 6 + 3,
                color: colors[Math.floor(Math.random() * colors.length)],
                rotation: Math.random() * 360,
                rotationSpeed: (Math.random() - 0.5) * 10,
                gravity: 0.25,
                drag: 0.96,
                life: 1,
                decay: 0.008 + Math.random() * 0.008
            });
        }
    }

    function updateConfetti() {
        confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        for (let i = confettiParticles.length - 1; i >= 0; i--) {
            const p = confettiParticles[i];
            p.vx *= p.drag;
            p.vy *= p.drag;
            p.vy += p.gravity;
            p.x += p.vx;
            p.y += p.vy;
            p.rotation += p.rotationSpeed;
            p.life -= p.decay;

            if (p.life <= 0 || p.y > confettiCanvas.height + 20) {
                confettiParticles.splice(i, 1);
                continue;
            }

            confettiCtx.save();
            confettiCtx.translate(p.x, p.y);
            confettiCtx.rotate((p.rotation * Math.PI) / 180);
            confettiCtx.globalAlpha = p.life;
            confettiCtx.fillStyle = p.color;
            confettiCtx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
            confettiCtx.restore();
        }

        if (confettiParticles.length > 0) {
            confettiAnimationId = requestAnimationFrame(updateConfetti);
        }
    }

    function fireConfetti(x, y) {
        createConfetti(x, y);
        if (!confettiAnimationId || confettiParticles.length <= 60) {
            cancelAnimationFrame(confettiAnimationId);
            updateConfetti();
        }
    }

    function showScorePopup(text) {
        const popup = document.createElement('div');
        popup.className = 'score-popup';
        popup.textContent = text;
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 1000);
    }
    
    // ===================== INIT =====================
    function init() {
        loadProgress();
        loadStreak();
        checkStreakOnLoad();
        initTheme();
        renderCategories();
        renderQuiz();
        updateHUD();
        renderNavGrid();
        // Measure HUD after fonts load
        setTimeout(updateHudHeight, 200);
        window.addEventListener('resize', updateHudHeight);

        const importInput = document.getElementById('streakImportInput');
        if (importInput) {
            importInput.addEventListener('change', (e) => {
                const file = e.target.files && e.target.files[0];
                if (file) importStreakBackup(file);
                importInput.value = '';
            });
        }

        // Close keyword tooltip on any outside tap
        document.addEventListener('click', (e) => {
            const tooltip = document.getElementById('kwTooltip');
            if (tooltip && !tooltip.contains(e.target) && !e.target.classList.contains('kw-chip')) {
                closeKwTooltip();
            }
        });

        // Pulse HUD if mistakes bank already has items from previous sessions
        updateMistakesHudPulse(loadMistakes().length);
    }

    init();
    
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      // ضفنا ?v=2 عشان نجبر المتصفح يقرأ النسخة الجديدة حالا ويحدث الأيقونة
      navigator.serviceWorker.register('./sw.js?v=2', { scope: './' })
        .then(reg => {
          console.log('Service Worker registered successfully with scope: ', reg.scope);
        })
        .catch(err => console.error('Service Worker registration failed: ', err));
    });
  }
