<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="ALCPT Pro Quiz - تطبيق اختبارات إنجليزي تفاعلي متقدم">
    <title>ALCPT Pro Quiz</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
 <link rel="manifest" href="./manifest.json">
    <style>
        :root {
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.65);
            --card: rgba(30, 41, 59, 0.85);
            --text: #f8fafc;
            --text-secondary: #94a3b8;
            --primary: #f59e0b;
            --primary-light: #fbbf24;
            --success: #10b981;
            --success-light: #6ee7b7;
            --danger: #ef4444;
            --danger-light: #fca5a5;
            --info: #3b82f6;
            --border: rgba(255,255,255,0.08);
            --shadow: 0 8px 32px rgba(0,0,0,0.35);
            --glass: blur(20px) saturate(160%);
            --radius: 24px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --hud-height: 132px;
            --nav-height: 60px;
            --content-padding-x: 14px;
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --surface: rgba(255,255,255,0.7);
            --card: rgba(255,255,255,0.92);
            --text: #0f172a;
            --text-secondary: #64748b;
            --border: rgba(0,0,0,0.06);
            --shadow: 0 8px 32px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Cairo', 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
            transition: background 0.4s, color 0.4s;
            -webkit-font-smoothing: antialiased;
        }

        /* ========== TOP HUD ========== */
        .top-hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: var(--surface);
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            border-bottom: 1px solid var(--border);
            padding: 8px 14px;
            padding-top: max(8px, env(safe-area-inset-top));
            transition: var(--transition);
        }

        .hud-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .app-title {
            font-size: 1rem;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: -0.5px;
        }

        .hud-stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }

        .hud-stat {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 6px 4px;
            text-align: center;
            transition: var(--transition);
        }
        .hud-stat .stat-icon { font-size: 1.1rem; display: block; margin-bottom: 2px; }
        .hud-stat .stat-value { font-size: 0.95rem; font-weight: 800; }
        .hud-stat .stat-label { font-size: 0.6rem; color: var(--text-secondary); font-weight: 600; }

        .hud-stat .stat-icon { font-size: 1.3rem; display: block; margin-bottom: 4px; }
        .hud-stat .stat-value { font-size: 1.1rem; font-weight: 800; }
        .hud-stat .stat-label { font-size: 0.65rem; color: var(--text-secondary); font-weight: 600; }

        .hud-stat.correct { background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.2); }
        .hud-stat.correct .stat-value { color: var(--success); }
        .hud-stat.wrong { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.2); }
        .hud-stat.wrong .stat-value { color: var(--danger); }
        .hud-stat.percent .stat-value { color: var(--primary); }

        /* ===================== KEYWORD TOOLTIP ===================== */
        .kw-chip {
            display: inline-block;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.82rem;
            color: var(--primary-light);
            background: rgba(245,158,11,0.12);
            border: 1px solid rgba(245,158,11,0.25);
            transition: background 0.18s, transform 0.15s;
            position: relative;
            user-select: none;
            white-space: nowrap;
            text-decoration: underline dotted rgba(245,158,11,0.6);
            text-underline-offset: 3px;
        }
        .kw-chip:active { transform: scale(0.93); }
        .kw-chip.active { background: rgba(245,158,11,0.22); border-color: rgba(245,158,11,0.55); }

        /* Tooltip bubble — positioned via JS */
        #kwTooltip {
            position: fixed;
            z-index: 9500;
            max-width: 260px;
            background: var(--card);
            border: 1px solid rgba(245,158,11,0.35);
            border-radius: 14px;
            padding: 12px 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 0 0 1px rgba(245,158,11,0.08);
            opacity: 0;
            pointer-events: none;
            transform: translateY(-6px) scale(0.95);
            transition: opacity 0.18s ease, transform 0.18s ease;
        }
        #kwTooltip.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }
        #kwTooltip .tt-en {
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--primary-light);
            margin-bottom: 4px;
            font-family: 'Poppins', sans-serif;
        }
        #kwTooltip .tt-ar {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
            font-family: 'Cairo', sans-serif;
        }
        /* Arrow pointer on top of tooltip */
        #kwTooltip::before {
            content: '';
            position: absolute;
            top: -7px;
            left: var(--arrow-left, 50%);
            transform: translateX(-50%);
            border-width: 0 7px 7px;
            border-style: solid;
            border-color: transparent transparent rgba(245,158,11,0.35) transparent;
        }
        #kwTooltip::after {
            content: '';
            position: absolute;
            top: -5px;
            left: var(--arrow-left, 50%);
            transform: translateX(-50%);
            border-width: 0 6px 6px;
            border-style: solid;
            border-color: transparent transparent var(--card) transparent;
        }

        /* ===================== REVIEW MODE SCREEN ===================== */
        #review-screen { /* uses existing .screen class */ }

        .review-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 4px 0;
        }
        .review-exit-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 50px;
            background: var(--surface);
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
        }
        .review-exit-btn:active { background: var(--card); transform: scale(0.95); }
        .review-title {
            font-size: 1rem;
            font-weight: 800;
            color: var(--danger);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .review-counter-pill {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 50px;
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.25);
            color: var(--danger);
            white-space: nowrap;
        }

        /* Remaining-count progress dots inside review card */
        .review-remaining {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin: 10px 0 14px;
        }
        .review-remaining .rdot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: rgba(239,68,68,0.25);
            border: 1.5px solid rgba(239,68,68,0.35);
            transition: background 0.25s;
        }
        .review-remaining .rdot.filled {
            background: var(--danger);
            border-color: var(--danger);
        }

        /* Empty state when bank is empty */
        .review-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 20px;
            gap: 14px;
            text-align: center;
        }
        .review-empty .re-icon { font-size: 3.5rem; }
        .review-empty h3 { font-size: 1.2rem; font-weight: 800; color: var(--text); margin: 0; }
        .review-empty p { font-size: 0.9rem; color: var(--text-secondary); margin: 0; line-height: 1.6; }

        /* ========== STREAK BADGE ========== */
        .streak-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            background: linear-gradient(135deg, rgba(245,158,11,0.18), rgba(239,68,68,0.12));
            border: 1px solid rgba(245,158,11,0.35);
            border-radius: 50px;
            padding: 4px 12px 4px 10px;
            font-weight: 800;
            font-size: 0.85rem;
            color: var(--primary-light);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 2px 10px rgba(245,158,11,0.12);
        }
        .streak-badge:active { transform: scale(0.94); }
        .streak-badge .streak-flame {
            font-size: 1rem;
            display: inline-block;
            animation: flameFlicker 1.6s ease-in-out infinite;
            filter: drop-shadow(0 0 6px rgba(245,158,11,0.6));
        }
        .streak-badge.streak-zero .streak-flame {
            filter: none;
            opacity: 0.45;
            animation: none;
        }
        .streak-badge.streak-zero {
            color: var(--text-secondary);
            border-color: var(--border);
            background: var(--surface);
            box-shadow: none;
        }
        @keyframes flameFlicker {
            0%, 100% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.08) rotate(-4deg); }
            50% { transform: scale(0.96) rotate(3deg); }
            75% { transform: scale(1.05) rotate(-2deg); }
        }

        /* ========== STREAK / SESSION OVERLAY ========== */
        .streak-overlay {
            position: fixed;
            inset: 0;
            background: rgba(8,12,24,0.72);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .streak-overlay.show { opacity: 1; pointer-events: auto; }
        .streak-modal {
            background: linear-gradient(160deg, rgba(30,41,59,0.95), rgba(15,23,42,0.95));
            border: 1px solid rgba(245,158,11,0.25);
            border-radius: 28px;
            padding: 32px 24px;
            max-width: 360px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(245,158,11,0.08);
            transform: scale(0.85) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        [data-theme="light"] .streak-modal {
            background: linear-gradient(160deg, #ffffff, #f1f5f9);
            border-color: rgba(245,158,11,0.3);
        }
        .streak-overlay.show .streak-modal { transform: scale(1) translateY(0); }
        .streak-modal .streak-icon-big {
            font-size: 4.2rem;
            display: inline-block;
            margin-bottom: 8px;
            animation: streakBigPulse 1.4s ease-in-out infinite;
            filter: drop-shadow(0 0 18px rgba(245,158,11,0.55));
        }
        @keyframes streakBigPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12) rotate(-3deg); }
        }
        .streak-modal h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 4px;
            color: var(--text);
        }
        .streak-modal .streak-count-big {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 6px 0;
        }
        .streak-modal .streak-sub {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 22px;
            line-height: 1.6;
        }
        .streak-modal .streak-stats-row {
            display: flex;
            gap: 10px;
            margin-bottom: 22px;
        }
        .streak-modal .streak-stat-box {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px 6px;
        }
        .streak-modal .streak-stat-box .ssb-val {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary);
        }
        .streak-modal .streak-stat-box .ssb-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-weight: 600;
            margin-top: 2px;
        }
        .streak-modal .streak-progress-track {
            height: 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.08);
            overflow: hidden;
            margin-bottom: 8px;
        }
        .streak-modal .streak-progress-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, var(--success), var(--success-light));
            transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1);
            width: 0%;
        }
        .streak-modal .streak-progress-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 700;
            margin-bottom: 22px;
        }
        .streak-modal .streak-week-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 0 4px;
        }
        .streak-modal .streak-day {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            font-size: 0.65rem;
            color: var(--text-secondary);
            font-weight: 700;
        }
        .streak-modal .streak-day-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            background: var(--surface);
            border: 1px solid var(--border);
        }
        .streak-modal .streak-day-circle.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-color: var(--primary);
            box-shadow: 0 0 14px rgba(245,158,11,0.4);
        }
        .streak-modal .streak-day-circle.today {
            border: 2px solid var(--primary-light);
        }
        .streak-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #1a1206;
            font-weight: 800;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(245,158,11,0.35);
            transition: var(--transition);
        }
        .streak-btn:active { transform: scale(0.97); }
        .streak-backup-btn {
            flex: 1;
            padding: 10px 6px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--surface);
            color: var(--text-secondary);
            font-weight: 700;
            font-size: 0.75rem;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
        }
        .streak-backup-btn:active { transform: scale(0.96); background: var(--card); }

        .progress-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 2px;
        }

        .progress-track {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.06);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 4px;
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 0%;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        .progress-text {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-secondary);
            min-width: 40px;
            text-align: left;
        }

        /* ========== THEME TOGGLE ========== */
        .theme-toggle {
            position: fixed;
            top: max(14px, env(safe-area-inset-top));
            left: 16px;
            z-index: 1001;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--surface);
            backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
            box-shadow: var(--shadow);
        }
        .theme-toggle:active { transform: scale(0.9); }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            padding-top: calc(var(--hud-height) + env(safe-area-inset-top) + 8px);
            padding-bottom: calc(var(--nav-height) + env(safe-area-inset-bottom) + 28px);
            padding-left: var(--content-padding-x);
            padding-right: var(--content-padding-x);
            min-height: 100dvh;
            max-width: min(640px, 100%);
            margin: 0 auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .screen { display: none; }
        .screen.active { display: block; animation: screenEnter 0.4s ease; }

        @keyframes screenEnter {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== QUESTION CARD ========== */
        .card-wrapper {
            padding: 0;
            position: relative;
        }

        .question-card {
            background: var(--card);
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px 22px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .question-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 100%;
            background: radial-gradient(circle at 50% 0%, rgba(245,158,11,0.08), transparent 70%);
            pointer-events: none;
        }

        .card-enter { animation: cardEnter 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .card-exit { animation: cardExit 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        @keyframes cardEnter {
            from { opacity: 0; transform: translateX(80px) scale(0.92) rotate(2deg); }
            to { opacity: 1; transform: translateX(0) scale(1) rotate(0); }
        }
        @keyframes cardExit {
            from { opacity: 1; transform: translateX(0) scale(1); }
            to { opacity: 0; transform: translateX(-80px) scale(0.92) rotate(-2deg); }
        }
        @keyframes cardExitRight {
            from { opacity: 1; transform: translateX(0) scale(1); }
            to { opacity: 0; transform: translateX(80px) scale(0.92) rotate(2deg); }
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .q-badge {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #0f172a;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.8rem;
            box-shadow: 0 4px 12px rgba(245,158,11,0.25);
        }

        .q-category {
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(255,255,255,0.03);
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .question-text {
            font-family: 'Poppins', 'Cairo', sans-serif;
            direction: ltr;
            text-align: left;
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.45;
            margin-bottom: 14px;
            color: var(--text);
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            z-index: 1;
            flex: 1 0 auto;
            justify-content: flex-start;
            margin-bottom: 8px;
        }

        .option-btn {
            background: rgba(255,255,255,0.02);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 12px 14px;
            border-radius: 16px;
            font-family: 'Poppins', 'Cairo', sans-serif;
            font-size: 1rem;
            text-align: left;
            direction: ltr;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 48px;
        }

        .option-btn::before {
            content: '';
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-radius: 50%;
            flex-shrink: 0;
            transition: var(--transition);
        }

        .option-btn:hover:not(:disabled) {
            border-color: rgba(245,158,11,0.4);
            background: rgba(245,158,11,0.04);
            transform: translateX(-4px);
        }

        .option-btn:active:not(:disabled) { transform: scale(0.98); }

        .option-btn.correct {
            background: rgba(16,185,129,0.1) !important;
            border-color: var(--success) !important;
            color: var(--success) !important;
            animation: pulseGreen 0.6s ease, correctPop 0.4s ease;
        }
        .option-btn.correct::before {
            border-color: var(--success);
            background: var(--success);
            box-shadow: 0 0 0 4px rgba(16,185,129,0.2);
        }
        .option-btn.correct::after {
            content: '✓';
            position: absolute;
            right: 16px;
            font-weight: 800;
            font-size: 1.1rem;
        }

        .option-btn.wrong {
            background: rgba(239,68,68,0.1) !important;
            border-color: var(--danger) !important;
            color: var(--danger) !important;
            animation: shake 0.5s ease, pulseRed 0.6s ease;
        }
        .option-btn.wrong::before {
            border-color: var(--danger);
            background: var(--danger);
            box-shadow: 0 0 0 4px rgba(239,68,68,0.2);
        }
        .option-btn.wrong::after {
            content: '✕';
            position: absolute;
            right: 16px;
            font-weight: 800;
            font-size: 1.1rem;
        }

        .option-btn:disabled { cursor: default; opacity: 1; }
        .option-btn:disabled:not(.correct):not(.wrong) { opacity: 0.4; }

        @keyframes pulseGreen {
            0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
            70% { box-shadow: 0 0 0 16px rgba(16,185,129,0); }
            100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
        }
        @keyframes pulseRed {
            0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
            70% { box-shadow: 0 0 0 16px rgba(239,68,68,0); }
            100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            15% { transform: translateX(-12px); }
            30% { transform: translateX(10px); }
            45% { transform: translateX(-8px); }
            60% { transform: translateX(6px); }
            75% { transform: translateX(-4px); }
        }
        @keyframes correctPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .explanation-box {
            margin-top: 12px;
            padding: 12px 14px;
            background: rgba(59,130,246,0.08);
            border-right: 4px solid var(--info);
            border-radius: 12px;
            color: #93c5fd;
            font-size: 0.88rem;
            line-height: 1.55;
            display: none;
            position: relative;
            z-index: 1;
            animation: slideDown 0.35s ease;
            font-weight: 500;
            flex-shrink: 0;
        }
        .explanation-box.show { display: block; }
        .explanation-box strong { color: var(--info); }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Next / Action Button */
        .action-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
            padding: 0;
            position: relative;
            z-index: 1;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #0f172a;
            border: none;
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: 800;
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(245,158,11,0.3);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:active { transform: scale(0.95); box-shadow: 0 2px 10px rgba(245,158,11,0.2); }

        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: var(--text);
            border: 2px solid var(--border);
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-secondary:active { transform: scale(0.95); }

        /* Completion State */
        .completion-card {
            text-align: center;
            padding: 40px 24px;
        }
        .completion-card .trophy { font-size: 5rem; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .completion-card h2 { font-size: 1.6rem; margin-bottom: 12px; color: var(--primary); }
        .completion-card p { color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6; }
        .score-ring {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: conic-gradient(var(--success) calc(var(--score)*1%), rgba(255,255,255,0.05) 0);
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 40px rgba(16,185,129,0.15);
        }
        .score-ring::before {
            content: '';
            position: absolute;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: var(--bg);
        }
        .score-ring span {
            position: relative;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--success);
        }

        /* ========== CATEGORIES SCREEN ========== */
        .screen-title {
            font-size: 1.4rem;
            font-weight: 800;
            padding: 0 0 16px;
            color: var(--text);
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            padding: 0;
        }

        .cat-card {
            background: var(--card);
            backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }
        .cat-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            opacity: 0;
            transition: opacity 0.3s;
        }
        .cat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
        .cat-card.active {
            border-color: var(--primary);
            background: rgba(245,158,11,0.08);
            transform: scale(1.02);
        }
        .cat-card.active::after { opacity: 1; }

        .cat-icon { font-size: 2.8rem; margin-bottom: 10px; display: block; }
        .cat-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
        .cat-count { color: var(--text-secondary); font-size: 0.8rem; font-weight: 500; }

        /* ========== STATS SCREEN ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            padding: 0;
            margin-bottom: 20px;
        }

        .stat-box {
            background: var(--card);
            backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: var(--transition);
        }
        .stat-box .stat-icon2 { font-size: 2rem; margin-bottom: 8px; }
        .stat-box .stat-number2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 4px; }
        .stat-box .stat-label2 { font-size: 0.8rem; color: var(--text-secondary); font-weight: 600; }

        .chart-container {
            background: var(--card);
            backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin: 0;
        }
        .chart-title { font-size: 1rem; font-weight: 700; margin-bottom: 20px; color: var(--text-secondary); text-align: center; }

        .bars-wrapper {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 24px;
            height: 140px;
        }

        .bar-group { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
        .bar-track {
            width: 60px;
            height: 140px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }
        .bar-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            border-radius: 12px;
            transition: height 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .bar-fill.correct { background: linear-gradient(to top, var(--success), var(--success-light)); }
        .bar-fill.wrong { background: linear-gradient(to top, var(--danger), var(--danger-light)); }
        .bar-fill.remaining { background: linear-gradient(to top, var(--text-secondary), rgba(255,255,255,0.2)); }
        .bar-label { font-size: 0.75rem; font-weight: 700; color: var(--text-secondary); }
        .bar-value { font-size: 0.85rem; font-weight: 800; margin-top: 2px; }

        /* ========== BOTTOM NAV ========== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: var(--surface);
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 4px 0 max(6px, env(safe-area-inset-bottom));
            transition: var(--transition);
            height: var(--nav-height);
            box-sizing: border-box;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 4px 2px;
            color: var(--text-secondary);
            background: none;
            border: none;
            font-family: 'Cairo', sans-serif;
            font-size: 0.65rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item.active::before {
            content: '';
            position: absolute;
            top: -6px;
            width: 40px;
            height: 3px;
            background: var(--primary);
            border-radius: 2px;
        }
        .nav-icon { font-size: 1.45rem; transition: transform 0.2s; }
        .nav-item:active .nav-icon { transform: scale(0.85); }

        /* ========== EMPTY STATE ========== */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }
        .empty-icon { font-size: 4rem; margin-bottom: 16px; opacity: 0.6; }
        .empty-text { font-size: 1.1rem; font-weight: 600; }

        /* ========== RESPONSIVE ========== */
        @media (min-width: 600px) {
            :root {
                --hud-height: 138px;
                --nav-height: 62px;
                --content-padding-x: 18px;
            }
            .question-text { font-size: 1.35rem; }
            .option-btn { font-size: 1.12rem; padding: 16px 18px; }
        }

        @media (max-width: 360px) {
            :root {
                --hud-height: 128px;
                --nav-height: 58px;
                --content-padding-x: 10px;
            }
            .question-text { font-size: 1.08rem; }
            .option-btn { font-size: 0.98rem; padding: 12px 14px; min-height: 48px; }
            .hud-stats-row { gap: 6px; }
            .hud-stat { padding: 8px 6px; }
            .categories-grid { gap: 10px; }
        }

        @media (min-width: 768px) {
            :root {
                --content-padding-x: 24px;
            }
            .question-card { padding: 18px 22px 20px; }
        }

        /* Utility */
        .hidden { display: none !important; }

        /* ========== PREV/NEXT ACTION BAR ========== */
        .nav-action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-top: 16px;
            padding: 0;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }
        .btn-prev {
            background: rgba(255,255,255,0.05);
            color: var(--text);
            border: 2px solid var(--border);
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-prev:hover { border-color: var(--primary); color: var(--primary); }
        .btn-prev:active { transform: scale(0.95); }
        .btn-prev:disabled { opacity: 0.25; cursor: default; pointer-events: none; }

        /* ========== QUESTIONS NAVIGATION GRID ========== */
        .nav-grid-toggle {
            position: fixed;
            bottom: calc(70px + env(safe-area-inset-bottom));
            left: 16px;
            z-index: 1001;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--surface);
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            transition: var(--transition);
            box-shadow: var(--shadow);
        }
        .nav-grid-toggle:active { transform: scale(0.9); }
        .nav-grid-toggle .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--primary);
            color: #0f172a;
            font-size: 0.6rem;
            font-weight: 800;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-grid-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2000;
            background: var(--surface);
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            border-top: 1px solid var(--border);
            border-radius: 28px 28px 0 0;
            padding: 0 16px 20px;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-height: 55vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -8px 40px rgba(0,0,0,0.4);
        }
        .nav-grid-panel.open { transform: translateY(0); }

        .nav-grid-handle {
            width: 40px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 12px auto 10px;
            flex-shrink: 0;
        }

        .nav-grid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            flex-shrink: 0;
        }
        .nav-grid-title {
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--text);
        }
        .nav-grid-legend {
            display: flex;
            gap: 10px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-weight: 600;
        }
        .nav-grid-legend span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .legend-dot.green { background: var(--success); }
        .legend-dot.red { background: var(--danger); }
        .legend-dot.gray { background: rgba(255,255,255,0.15); border: 1px solid var(--border); }
        .legend-dot.current { background: var(--primary); }

        .nav-grid-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.3rem;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
        }

        .nav-grid-scroll {
            overflow-y: auto;
            flex: 1;
            -webkit-overflow-scrolling: touch;
        }

        .nav-grid-cells {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 6px;
            padding-bottom: 4px;
        }

        @media (max-width: 380px) {
            .nav-grid-cells { grid-template-columns: repeat(8, 1fr); }
        }

        .nav-cell {
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: 1.5px solid transparent;
            background: rgba(255,255,255,0.04);
            border-color: var(--border);
            color: var(--text-secondary);
            position: relative;
        }
        .nav-cell:active { transform: scale(0.88); }
        .nav-cell.answered-correct {
            background: rgba(16,185,129,0.15);
            border-color: var(--success);
            color: var(--success);
        }
        .nav-cell.answered-wrong {
            background: rgba(239,68,68,0.15);
            border-color: var(--danger);
            color: var(--danger);
        }
        .nav-cell.current-q {
            border-color: var(--primary);
            background: rgba(245,158,11,0.15);
            color: var(--primary);
            box-shadow: 0 0 0 2px rgba(245,158,11,0.3);
        }

        /* Overlay behind panel */
        .nav-grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 1999;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .nav-grid-overlay.open { opacity: 1; pointer-events: all; }
    
        /* Confetti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        /* Enhanced correct animation */
        .option-btn.correct {
            background: rgba(16,185,129,0.12) !important;
            border-color: var(--success) !important;
            color: var(--success) !important;
            animation: pulseGreen 0.6s ease, correctPop 0.4s ease, glowGreen 1.5s ease infinite alternate !important;
        }
        @keyframes glowGreen {
            from { box-shadow: 0 0 0 0 rgba(16,185,129,0.3); }
            to { box-shadow: 0 0 20px 4px rgba(16,185,129,0.15); }
        }

        /* Enhanced wrong animation */
        .option-btn.wrong {
            background: rgba(239,68,68,0.12) !important;
            border-color: var(--danger) !important;
            color: var(--danger) !important;
            animation: shake 0.5s ease, pulseRed 0.6s ease !important;
        }

        /* Floating score popup */
        .score-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, var(--success), var(--success-light));
            color: #0f172a;
            padding: 16px 32px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.2rem;
            z-index: 9998;
            pointer-events: none;
            animation: scorePop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            box-shadow: 0 8px 32px rgba(16,185,129,0.4);
        }
        @keyframes scorePop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            70% { transform: translate(-50%, -50%) scale(0.95); opacity: 1; }
            100% { transform: translate(-50%, -80px) scale(1); opacity: 0; }
        }
        
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle Dark Mode">🌙</button>

    <!-- Nav Grid Toggle Button -->
    <button class="nav-grid-toggle" id="navGridToggle" onclick="toggleNavGrid()" title="لوحة التنقل">
        🗂️
        <span class="badge" id="navGridBadge">0</span>
    </button>

    <!-- Nav Grid Overlay -->
    <div class="nav-grid-overlay" id="navGridOverlay" onclick="closeNavGrid()"></div>

    <!-- Nav Grid Panel -->
    <div class="nav-grid-panel" id="navGridPanel">
        <div class="nav-grid-handle"></div>
        <div class="nav-grid-header">
            <div class="nav-grid-title">🗂️ لوحة تنقل الأسئلة</div>
            <button class="nav-grid-close" onclick="closeNavGrid()">✕</button>
        </div>
        <div class="nav-grid-legend">
            <span><span class="legend-dot current"></span>الحالي</span>
            <span><span class="legend-dot green"></span>صحيح</span>
            <span><span class="legend-dot red"></span>خاطئ</span>
            <span><span class="legend-dot gray"></span>لم يُحل</span>
        </div>
        <div style="height:10px; flex-shrink:0;"></div>
        <div class="nav-grid-scroll">
            <div class="nav-grid-cells" id="navGridCells"></div>
        </div>
    </div>

    <!-- Top HUD -->
    <header class="top-hud" id="topHud">
        <div class="hud-top-row">
            <div class="app-title">🎯 ALCPT Pro</div>
            <div class="streak-badge streak-zero" id="streakBadge" onclick="openStreakModal()">
                <span class="streak-flame" id="streakFlameIcon">🔥</span>
                <span id="streakCountText">0</span>
            </div>
            <div style="font-size:0.8rem; color:var(--text-secondary); font-weight:600;" id="hudCategory">الكل</div>
        </div>
        <div class="hud-stats-row">
            <div class="hud-stat correct">
                <span class="stat-icon">✅</span>
                <span class="stat-value" id="statCorrect">0</span>
                <span class="stat-label">صحيحة</span>
            </div>
            <div class="hud-stat wrong" onclick="initReviewMode()" style="cursor:pointer;" title="مراجعة الأخطاء">
                <span class="stat-icon">❌</span>
                <span class="stat-value" id="statWrong">0</span>
                <span class="stat-label">خاطئة</span>
            </div>
            <div class="hud-stat percent">
                <span class="stat-icon">📊</span>
                <span class="stat-value" id="statPercent">0%</span>
                <span class="stat-label">الإنجاز</span>
            </div>
        </div>
        <div class="progress-wrapper">
            <div class="progress-track">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <div class="progress-text" id="progressText">0/379</div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen active">
            <div id="quizContainer"></div>
        </div>

        <!-- Categories Screen -->
        <div id="categories-screen" class="screen">
            <div class="screen-title">📂 اختر القسم</div>

    <script>
    // ===================== DATA =====================
    const categories = [
    { id: 'all', name: 'الكل', icon: '📚' },
    { id: 'grammar', name: 'Grammar - القواعد', icon: '📝' },
    { id: 'synonyms', name: 'Synonyms - المترادفات', icon: '📖' },
    { id: 'vocabulary', name: 'Vocabulary - المفردات', icon: '💬' }
];
const questions = [
{n:1, q:"He likes compact cameras.", opts:["Modern and expensive","cheap and easy to find","small and easy to carry","colorful and durable"], correct:2, kw:"compact", logic:"كلمة compact معناها حاجة صغيرة ومضغوطة وسهل تشيلها معاك، عشان كدا الإجابة الصح هي small and easy to carry.", cat:"synonyms"},
{n:2, q:"By next month, I _____ in the navy for 22 years.", opts:["Have been","will be","will have","will have been"], correct:3, kw:"Future Perfect", logic:"لما تلاقي By + وقت في المستقبل، بنستخدم Future Perfect (will have been) عشان بيعبر عن حاجة هتكون اتكملت لحد وقت معين في المستقبل.", cat:"grammar"},
{n:3, q:"They looked at the diamond with rapture.", opts:["Anguish","agony","ecstasy","affiliation"], correct:2, kw:"rapture", logic:"كلمة rapture معناها فرحة وانبهار شديد جداً، وده معناه ecstasy.", cat:"synonyms"},
{n:4, q:"By 2015, Europe train traffic will quadruple.", opts:["It'll become five times as great.","It'll become four times less.","It'll become four times as great.","It'll become six times as great."], correct:2, kw:"quadruple", logic:"كلمة quadruple معناها بتتضاعف 4 مرات، يعني تبقى أربع أضعاف.", cat:"vocabulary"},
{n:5, q:"Tom loved to tantalize me with ice-cream and popcorn.", opts:["Cheer up","please","tease","delight"], correct:2, kw:"tantalize", logic:"كلمة tantalize معناها تغري حد بحاجة وتخليها قدامه بس ماتديهاش، يعني بتعذبه بالإغراء. وده معناه tease.", cat:"synonyms"},
{n:6, q:"Jason: Do you think the jury will believe Bob's story? Mike: He does ________", opts:["Bob is in a wheelchair.","Bob has no defense","Bob has never done anything wrong","Bob is tired of standing."], correct:2, kw:"He does / context", logic:"مايك بيوافق إن الـ jury هيصدقوه، وده منطقي لو Bob ماعملش حاجة غلط قبل كده.", cat:"vocabulary"},
{n:7, q:"His latent talent for drawing was discovered lately.", opts:["Dormant","patent","separative","dynamic"], correct:0, kw:"latent", logic:"كلمة latent معناها موهبة كانت موجودة بس مخفية، زي حاجة نايمة جوا الشخص. وده معناه dormant.", cat:"synonyms"},
{n:8, q:"We need to put our heads together and come up with a conclusion.", opts:["We need to stay close to each other.","We need to come to an agreement.","We need to work together.","We need to be careful about the conclusion."], correct:2, kw:"put our heads together", logic:"تعبير put our heads together معناه نتعاون ونفكر مع بعض عشان نوصل لحل.", cat:"vocabulary"},
{n:9, q:"All their recent decisions undermined this financial status.", opts:["Reinforced","wielded","weakened","waived"], correct:2, kw:"undermined", logic:"كلمة undermined معناها قوّض أو ضعّف حاجة، يعني القرارات خلّت الوضع المالي أضعف.", cat:"synonyms"},
{n:10, q:"Several students are slouching in the campus.", opts:["Moving lazily","playing music","chatting","walking fast"], correct:0, kw:"slouching", logic:"كلمة slouching معناها ماشي بشكل كسول ومنحني، زي اللي بيمشي وهو متكاسل.", cat:"synonyms"},
{n:11, q:"She likes making my hair stand on end.", opts:["Scaring me","encouraging me","making fun of me","amusing me"], correct:0, kw:"hair stand on end", logic:"تعبير make your hair stand on end معناه يخوفك لدرجة إن شعرك بيقف من الخوف.", cat:"vocabulary"},
{n:12, q:"Fatty snacks will soon lose their allure over time. What will they lose?", opts:["Poor quality","bad odor","exciting appeal","shape"], correct:2, kw:"allure", logic:"كلمة allure معناها الجاذبية والإغراء اللي بيخلي الحاجة مغرية.", cat:"synonyms"},
{n:13, q:"The house is part of local history and should be preserved.", opts:["Leased","conserved","abolished","demolished"], correct:1, kw:"preserved", logic:"كلمة preserved معناها محافظ عليه وصايناه من الاندثار، وأقرب كلمة ليها هي conserved.", cat:"synonyms"},
{n:14, q:"Some of the cream we have _____ sour.", opts:["Tasty","tastes","tasted","taste"], correct:2, kw:"linking verb / past", logic:"الجملة في الماضي وبعد فعل الحواس (taste) بنستخدم صفة، وبما إن الكلام عن الماضي فالإجابة الصح هي tasted.", cat:"grammar"},
{n:15, q:"The student can not _____ the Japanese lecture.", opts:["Comprehend","interrogate","relieve","represent"], correct:0, kw:"comprehend", logic:"كلمة comprehend معناها يفهم ويستوعب، والطالب مش قادر يفهم المحاضرة باليابانية.", cat:"vocabulary"},
{n:16, q:"I haven't seen the Smiths for a long time. They _____ abroad.", opts:["Can have been","could have been","should have been","must have been"], correct:3, kw:"must have been", logic:"لما بتكون متأكد من استنتاج في الماضي، بنستخدم must have been، يعني غالباً هم سافروا برّه.", cat:"grammar"},
{n:17, q:"We involved ourselves in the assignment with unfaltering determination.", opts:["Halting","abiding","vacillating","tentative"], correct:0, kw:"unfaltering", logic:"كلمة unfaltering معناها ثابت ومش بيتردد، وعكسها هو halting يعني بيوقف ويتردد.", cat:"synonyms"},
{n:18, q:"We went _____ last weekend in the lake.", opts:["Swimming","swim","to swimming","swam"], correct:0, kw:"go + gerund", logic:"بعد كلمة go في النشاطات الترفيهية بنحط الفعل على صيغة ing زي go swimming, go fishing, go shopping.", cat:"grammar"},
{n:19, q:"I don't think that he is to blame for breaking the computer.", opts:["At fault","at peace","at hand","at risk"], correct:0, kw:"to blame", logic:"تعبير to blame معناه إنه المسؤول والغلطان، وده نفس معنى at fault.", cat:"vocabulary"},
{n:20, q:"We've known _____ since we were children.", opts:["another","other","one after the other","one another"], correct:3, kw:"one another", logic:"لما بتتكلم عن مجموعة بيعرفوا بعض بنستخدم one another (لأكتر من اتنين)، وعشان هو بيتكلم عن صحاب كتير.", cat:"grammar"},
{n:21, q:"Phil: Whose car is that? Marina: I have no idea _____", opts:["whose car is it","whose car is that?","whose car it is?","whose car it is"], correct:3, kw:"indirect question", logic:"بعد I have no idea بنستخدم indirect question، يعني بنحط الـ subject قبل الـ verb ومن غير علامة استفهام.", cat:"grammar"},
{n:22, q:"His eccentric behavior lost him his job.", opts:["straight","peculiar","harsh","complacent"], correct:1, kw:"eccentric", logic:"كلمة eccentric معناها تصرفات غريبة وغير عادية، وأقرب كلمة ليها هي peculiar.", cat:"synonyms"},
{n:23, q:"The fireman has trouble _____ the fire.", opts:["extinguishing","extinguish","to extinguish","extinguishes"], correct:0, kw:"have trouble + gerund", logic:"بعد have trouble بنحط الفعل على صيغة ing دايماً.", cat:"grammar"},
{n:24, q:"The present law has failed to achieve its objectives. The aims were never _____", opts:["Reviewed","increased","reached","defined"], correct:2, kw:"achieve objectives", logic:"تحقيق الأهداف يعني وصلنا ليها، وأقرب كلمة لـ achieve objectives هي reached.", cat:"synonyms"},
{n:25, q:"Could you give me a bag of potato chips _____ this milk.", opts:["Come along with","chip in on","no matter what","in exchange for"], correct:3, kw:"in exchange for", logic:"تعبير in exchange for معناه مقابل أو بدل، يعني هاخد الشيبسي وأديك اللبن بدلاً منه.", cat:"vocabulary"},
{n:26, q:"Living conditions at the camp were intolerable.", opts:["Unconditional","unattainable","unbeatable","unbearable"], correct:3, kw:"intolerable", logic:"كلمة intolerable معناها مش قادر تتحمله خالص، وأقرب كلمة ليها هي unbearable.", cat:"synonyms"},
{n:27, q:"The airman just completed a course in the _____", opts:["Facilities","dimensions","evidence","fundamentals"], correct:3, kw:"fundamentals", logic:"كلمة fundamentals معناها الأساسيات والمبادئ الأساسية، وده المنطقي إن حد يعمل كورس فيه.", cat:"vocabulary"},
{n:28, q:"There must be some rational explanation for the bizarre action.", opts:["Influential","hidden","superficial","logical"], correct:3, kw:"rational", logic:"كلمة rational معناها منطقي ومعقول، وأقرب كلمة ليها هي logical.", cat:"synonyms"},
{n:29, q:"A NASA spokesman said that the satellite will be launched. _____ the rocket.", opts:["Destroyed","manufactured","fired","repaired"], correct:2, kw:"launched", logic:"كلمة launched معناها أطلق أو أشعل، وبالنسبة للصاروخ أقرب كلمة ليها هي fired.", cat:"synonyms"},
{n:30, q:"_____, they had no chance of winning.", opts:["They fight as bravely.","Bravely as fighting","Bravely as they fought","they bravely fought"], correct:2, kw:"Concession / inversion", logic:"لما بنعمل inversion في الجملة بنحط الصفة أو الظرف الأول وبعدين as وبعدين الـ subject والفعل: Bravely as they fought.", cat:"grammar"},
{n:31, q:"It's essential that Peter _____ on time for his lectures.", opts:["Were","be","is","was"], correct:1, kw:"subjunctive mood", logic:"بعد كلمات زي essential / important / necessary بنستخدم الـ subjunctive يعني الفعل في صيغته الأساسية (base form) من غير أي تصريف.", cat:"grammar"},
{n:32, q:"Could you check my work _____ for mistakes before I hand it in?", opts:["Out","up","in","over"], correct:3, kw:"check over", logic:"تعبير check over معناه تراجع وتفحص حاجة بعناية عشان تلاقي الأخطاء.", cat:"vocabulary"},
{n:33, q:"We were _____ broke after our shopping trip.", opts:["Quietly","fair","awfully","awful"], correct:2, kw:"awfully", logic:"هنا محتاجين كلمة بتوصف الفعل (adverb)، وكلمة awfully معناها بشدة، يعني كنا مفلسين جداً.", cat:"grammar"},
{n:34, q:"Someone who is always unhappy might bring you _____", opts:["Up","down","to","in"], correct:1, kw:"bring down", logic:"تعبير bring someone down معناه يعكّر مزاجك ويخليك زعلان زيه.", cat:"vocabulary"},
{n:35, q:"Raymond did me a favor yesterday.", opts:["Asked me to help him","didn't need help","helped me","didn't help me"], correct:2, kw:"did me a favor", logic:"تعبير do someone a favor معناه يعمل لحد معروف أو يساعده.", cat:"vocabulary"},
{n:36, q:"Up to twenty users can have simultaneous access to the system.", opts:["For very short time","at the same time","separately","permanently"], correct:1, kw:"simultaneous", logic:"كلمة simultaneous معناها في نفس الوقت، يعني كل الـ 20 يشتغلوا مع بعض.", cat:"synonyms"},
{n:37, q:"Mat speaks French too rapidly _____", opts:["For me to understand","to me for understanding","for me for understanding","to me to understand"], correct:0, kw:"too + adj + for + object + to + verb", logic:"القاعدة بتقول: too + adjective + for + object + to + verb. يعني بيتكلم بسرعة كبيرة قوي بحيث إني مش قادر أفهم.", cat:"grammar"},
{n:38, q:"It is too much of a hassle to use both toothpaste and mouthwash.", opts:["aggravating","proper","complete","pleasing"], correct:0, kw:"hassle", logic:"كلمة hassle معناها حاجة بتزعلك وبتضايقك وبتاخد منك وقت ومجهود، وأقرب كلمة ليها هي aggravating.", cat:"synonyms"},
{n:39, q:"Meat, vegetables, dairy, napkins and noodles are examples of _____", opts:["recipes","raw material","groceries","dried fruit"], correct:2, kw:"groceries", logic:"كل الحاجات دي بتتشتري من السوبرماركت ودي بتتسمى groceries يعني مشتريات البيت.", cat:"vocabulary"},
{n:40, q:"The doctor may be able to _____ you something for that cough.", opts:["prevent","preserve","rehabilitate","prescribe"], correct:3, kw:"prescribe", logic:"الدكتور بيكتب لك دواء، والكلمة الصح هي prescribe يعني يصرف أو يكتب روشتة.", cat:"vocabulary"},
{n:41, q:"The tired soldier _____ while having the briefing.", opts:["Dropped out of","dropped by","dropped in","dropped off"], correct:3, kw:"drop off", logic:"تعبير drop off معناه تنام من غير ما تقصد، زي اللي بيغلب عليه النوم وهو بيستمع.", cat:"vocabulary"},
{n:42, q:"The ointment will _____ the spread of infection.", opts:["block or slow down","live in a certain place","somewhat enhance","itch or burn"], correct:0, kw:"inhibit", logic:"كلمة inhibit معناها يمنع أو يبطئ، يعني المرهم هيوقف أو يبطئ انتشار العدوى.", cat:"synonyms"},
{n:43, q:"Did he _____ you going to the drugstore with him?", opts:["Drop off","insist on","get through","use up"], correct:1, kw:"insist on", logic:"تعبير insist on معناه يُصر على حاجة ومش بيتنازل عنها.", cat:"vocabulary"},
{n:44, q:"Within the training class a dispute arose.", opts:["aggravation","quarrel","resentment","concord"], correct:1, kw:"dispute", logic:"كلمة dispute معناها خلاف ونقاش حاد، وأقرب كلمة ليها هي quarrel يعني شجار أو خلاف.", cat:"synonyms"},
{n:45, q:"Melvin _____ about the meeting yesterday.", opts:["Was said","was told","is told","was tell"], correct:1, kw:"passive voice / past", logic:"في الـ passive بنقول was told مش was said، عشان told بتتعدى للمفعول مباشرة، بينما said لازم تقول said to him.", cat:"grammar"},
{n:46, q:"These two candidates are certainly distinct. Every candidate is _____", opts:["Dishonest","clearly different","about the same age","patriotic"], correct:1, kw:"distinct", logic:"كلمة distinct معناها واضح ومختلف بشكل واضح، وأقرب معنى ليها هي clearly different.", cat:"synonyms"},
{n:47, q:"Martha doesn't like Chinese food, and _____", opts:["They do too","neither they do","they don't neither","neither do they"], correct:3, kw:"neither + inversion", logic:"في الجمل السلبية المتفقة بنستخدم neither وبعدين بنعمل inversion: neither do they.", cat:"grammar"},
{n:48, q:"They went to Houston on a tour. They stayed there _____ and came back this morning.", opts:["Check out","final","overnight","rest"], correct:2, kw:"overnight", logic:"كلمة overnight معناها فضلوا هناك طول الليل ورجعوا الصبح، وده يتطابق مع الجملة.", cat:"vocabulary"},
{n:49, q:"I bought a black pair of pants.", opts:["Shoes","gloves","trousers","socks"], correct:2, kw:"pants", logic:"كلمة pants معناها بنطلون، وأقرب كلمة ليها هي trousers.", cat:"synonyms"},
{n:50, q:"The scores on the final test were incredible.", opts:["Predicted","standard","unbelievable","ordinary"], correct:2, kw:"incredible", logic:"كلمة incredible معناها مش قادر تصدقه، وأقرب كلمة ليها هي unbelievable.", cat:"synonyms"},
{n:51, q:"The people who applied for the secretary job were told that they would be _____ of the manager's decision in 10 days.", opts:["engaged","alerted","settled","notified"], correct:3, kw:"notified", logic:"كلمة notified معناها هيتم إبلاغهم وإخبارهم بالقرار.", cat:"vocabulary"},
{n:52, q:"Because he refused to study for the Book Quiz, he _____ a score.", opts:["get","got","getting","was get"], correct:1, kw:"past simple", logic:"الجملة في الماضي (refused)، عشان كدا لازم نستخدم got صيغة الماضي البسيط.", cat:"grammar"},
{n:53, q:"We attacked the enemy with lethal force.", opts:["negligible","minor","deadly","soothing"], correct:2, kw:"lethal", logic:"كلمة lethal معناها مميت وقاتل، وأقرب كلمة ليها هي deadly.", cat:"synonyms"},
{n:54, q:"It is absolutely essential that Joe _____ 80 on his next ECL.", opts:["to get","get","got","gets"], correct:1, kw:"subjunctive mood", logic:"بعد essential بنستخدم الـ subjunctive يعني الفعل في صيغته الأساسية (base form) من غير أي تصريف.", cat:"grammar"},
{n:55, q:"My son wanted to go to the beach _____ the heavy rain.", opts:["In despite","despite of","in spite of","in spite"], correct:2, kw:"in spite of", logic:"الصيغة الصح هي in spite of وبعدها اسم أو gerund. كلمة despite لوحدها مش محتاجة of، لكن in spite لازم يجي بعدها of.", cat:"grammar"},
{n:56, q:"I would be wary of anything he tells you.", opts:["Gullible","accepting","cautious","approving"], correct:2, kw:"wary", logic:"كلمة wary معناها حذر ومتيقظ، وأقرب كلمة ليها هي cautious.", cat:"synonyms"},
{n:57, q:"All of the soldiers seemed sluggish during the parade practice.", opts:["Energetic","slow and lazy","vivacious","vigorous"], correct:1, kw:"sluggish", logic:"كلمة sluggish معناها بطيء ومتكاسل، وأقرب معنى ليها هي slow and lazy.", cat:"synonyms"},
{n:58, q:"The company had to go through a lot of red tape to get its plans approved.", opts:["Unexpected cost increases","quick preliminary meetings","angry protests by workers","bureaucratic procedures"], correct:3, kw:"red tape", logic:"تعبير red tape معناه البيروقراطية والإجراءات الحكومية المعقدة اللي بتاخد وقت طويل.", cat:"vocabulary"},
{n:59, q:"I will _____ about the M-16 and how to disassemble it.", opts:["explain you","going to explain you","explain to you","splain you"], correct:2, kw:"explain to", logic:"فعل explain دايماً بياخد to قبل المفعول، يعني مش explain you لكن explain to you.", cat:"grammar"},
{n:60, q:"Tom needs some _____ to do this job, he can't work by himself.", opts:["confidence","laziness","tolerance","assistance"], correct:3, kw:"assistance", logic:"Tom مش قادر يشتغل لوحده، يعني محتاج مساعدة، وده معنى كلمة assistance.", cat:"vocabulary"},
{n:61, q:"A leader must have a lot of confidence _____ his soldiers.", opts:["Of","at","in","to"], correct:2, kw:"confidence in", logic:"كلمة confidence دايماً بتيجي معها in، يعني confidence in his soldiers.", cat:"grammar"},

{n:65, q:"Sherry drives _____", opts:["the most carefully","the more careful","the most careful","more careful"], correct:0, kw:"superlative adverb", logic:"احنا محتاجين adverb مش adjective، عشان بتوصف فعل drives. الصيغة الصح هي the most carefully.", cat:"grammar"},
{n:66, q:"They have a _____ plan.", opts:["controversial","secret","contingency","peace"], correct:2, kw:"contingency plan", logic:"تعبير contingency plan معناه خطة احتياطية أو بديلة بتستخدمها لو حصل طارئ.", cat:"vocabulary"},

{n:68, q:"_____ are clocks.", opts:["These","This","That","The"], correct:0, kw:"demonstrative pronoun / plural", logic:"الاسم clocks جمع، عشان كدا لازم نستخدم These مش This.", cat:"grammar"},
{n:69, q:"_____ is that room?", opts:["How length","What long","How long","What length"], correct:2, kw:"How long", logic:"للسؤال عن الطول أو المدة بنستخدم How long.", cat:"grammar"},
{n:70, q:"Tina needs some more cigarettes. Does Paul have any?", opts:["No, he has none","No, he has any","No, he doesn't have some","yes, he has any"], correct:0, kw:"none / any", logic:"في الإجابة السلبية بنقول he has none يعني ماعندوش أي حاجة، مش has any.", cat:"grammar"},

{n:72, q:"We have to determine _____ ammunition the unit _____", opts:["how many – have","how much – is have","amount – having","how much – has"], correct:3, kw:"how much / uncountable", logic:"ammunition مش محسوبة (uncountable) عشان كدا بنستخدم how much، والفعل بيتبع الـ unit وهو مفرد فيبقى has.", cat:"grammar"},

{n:76, q:"There has been a _____ in that store's prices.", opts:["Reduction","reduce","reduces","to reduce"], correct:0, kw:"noun after article", logic:"بعد a محتاجين اسم (noun)، والاسم هو Reduction يعني تخفيض.", cat:"grammar"},
{n:77, q:"When you want to ask a question, _____ your hand.", opts:["replace","collect","remove","raise"], correct:3, kw:"raise your hand", logic:"لما تعوز تسأل بترفع إيدك، والفعل الصح هو raise.", cat:"vocabulary"},
{n:78, q:"The medicine tastes _____", opts:["bad","badly","well","worse"], correct:0, kw:"linking verb + adjective", logic:"بعد أفعال الحواس زي tastes بنحط adjective مش adverb، عشان كدا bad مش badly.", cat:"grammar"},

{n:80, q:"The parachutist _____ his legs when he landed roughly among some rocks.", opts:["hurting","hurted","hurts","hurt"], correct:3, kw:"past simple / irregular verb", logic:"الفعل hurt من الأفعال الشاذة اللي ماتغيرش في الماضي، يعني hurt في الماضي برضو hurt.", cat:"grammar"},

{n:83, q:"A train is faster than a car but an airplane is _____", opts:["the fastest","the faster","the fast","faster than"], correct:0, kw:"superlative", logic:"بنقارن بين أكتر من اتنين (قطر وعربية وطيارة)، عشان كدا بنستخدم superlative: the fastest.", cat:"grammar"},

{n:85, q:"The general ordered that Sgt Smith _____ in his office at 0700.", opts:["Be","was","being","is"], correct:0, kw:"subjunctive after ordered", logic:"بعد ordered that بنستخدم الـ subjunctive يعني الفعل في صيغته الأساسية (be) من غير تصريف.", cat:"grammar"},
{n:86, q:"The young woman purposely signed the wrong name on the document. She _____ the document.", opts:["Falsification","falsify","false","falsified"], correct:3, kw:"falsified", logic:"محتاجين فعل في الماضي، وكلمة falsified معناها زوّر أو حرّف.", cat:"vocabulary"},

{n:88, q:"Steve has many outstanding attributes, not the least of which is his impeccable appearance.", opts:["Steve would be outstanding if he weren't sloppy.","Steve looks bad most of the time.","Steve is usually neat and clean.","Steve has no outstanding attributes."], correct:2, kw:"impeccable appearance", logic:"كلمة impeccable معناها مثالي ومن غير عيوب، وده يعني إنه دايماً شكله أنيق ونظيف.", cat:"vocabulary"},

{n:107, q:"He hurt his shin, so it is hard for him to _____", opts:["Eat","yawn","speak","kneel"], correct:3, kw:"shin", logic:"كلمة shin معناها قصبة الساق، اللي بيتألم فيها صعب يركع، والإجابة الصح هي kneel.", cat:"vocabulary"},

{n:111, q:"She forced her way into the house and ransacked all my drawers.", opts:["Presided","raided","struck","searched thoroughly"], correct:3, kw:"ransacked", logic:"كلمة ransacked معناها فتش كل حاجة بطريقة فوضوية، وأقرب معنى ليها هي searched thoroughly.", cat:"synonyms"},

{n:116, q:"It's evident that she was involved in the murder.", opts:["Disturbing","clear","doubtful","ambiguous"], correct:1, kw:"evident", logic:"كلمة evident معناها واضح وظاهر، وأقرب كلمة ليها هي clear.", cat:"synonyms"},

{n:118, q:"What happened to General Robert?", opts:["Became of","felt to","became","created"], correct:0, kw:"what became of", logic:"السؤال what happened to بيقابله what became of، وده تعبير ثابت في الإنجليزي.", cat:"vocabulary"},
{n:119, q:"They have some concerns about their scores.", opts:["Doubts","graduation","hopes","worries"], correct:3, kw:"concerns", logic:"كلمة concerns معناها قلق وهموم، وأقرب كلمة ليها هي worries.", cat:"synonyms"},

{n:122, q:"Andy has a fever and won't come to work today.", opts:["Normal temperature","high temperature","regular temperature","low temperature"], correct:1, kw:"fever", logic:"كلمة fever معناها حمّى، يعني درجة الحرارة عالية، والإجابة الصح هي high temperature.", cat:"synonyms"},
{n:123, q:"_____ I you, I wouldn't do that.", opts:["Was","Would be","Am","Were"], correct:3, kw:"second conditional", logic:"في الـ second conditional بعد if/were بنستخدم were مع كل الضمائر (حتى I)، يعني Were I you.", cat:"grammar"},
{n:124, q:"I found Anna's flat _____ losing her address.", opts:["In spite of","although","though","if"], correct:0, kw:"in spite of + gerund", logic:"محتاجين حاجة بتيجي قبل اسم أو gerund، وده in spite of. أما although وthough بتيجي قبل جملة.", cat:"grammar"},
{n:125, q:"_____ is one of my favorite instruments, although it is a difficult instrument to play well.", opts:["The violin","some violin","any violin","A violin"], correct:0, kw:"the + instrument", logic:"لما بنتكلم عن آلة موسيقية كنوع عام بنستخدم the، يعني the violin.", cat:"grammar"},
{n:126, q:"Have you still got last _____ newspaper?", opts:["Saturdays'","Saturday","Saturdays","Saturday's"], correct:3, kw:"possessive noun", logic:"محتاجين possessive للدلالة على إضافة، يعني جريدة يوم السبت = Saturday's newspaper.", cat:"grammar"},
{n:127, q:"The _____ house is beautiful.", opts:["Smith","Smiths's","Smith's","Smiths'"], correct:2, kw:"possessive noun", logic:"البيت بتاع عيلة Smith الواحدة، عشان كدا بنكتب Smith's.", cat:"grammar"},
{n:128, q:"Do you mind _____ it with you?", opts:["To take","taking","take","takes"], correct:1, kw:"mind + gerund", logic:"بعد mind دايماً بنستخدم gerund (ing)، يعني mind taking.", cat:"grammar"},
{n:129, q:"What _____ if you had seen an accident on your way here?", opts:["would have you done","would you had done","would you have done","would you do"], correct:2, kw:"third conditional", logic:"ده third conditional لأن الكلام عن الماضي (had seen)، فالجواب بيبقى would + have + past participle: would you have done.", cat:"grammar"},
{n:130, q:"I found the old man quite changed. I _____ him for years.", opts:["Hadn't seen","haven't seen","haven't see","hasn't seen"], correct:0, kw:"past perfect", logic:"الحدث اتكلم عنه في الماضي (found)، عشان كدا بنستخدم past perfect: hadn't seen.", cat:"grammar"},
{n:131, q:"She left home two hours ago, so she _____ have arrived by now.", opts:["Can","must","could","should"], correct:1, kw:"must have + deduction", logic:"لما بنستنتج حاجة بدرجة عالية من اليقين عن الماضي بنستخدم must have.", cat:"grammar"},
{n:132, q:"I didn't like _____ of choices.", opts:["Neither","so","both","either"], correct:3, kw:"either in negative", logic:"في الجمل السلبية بنستخدم either مش both، يعني didn't like either.", cat:"grammar"},
