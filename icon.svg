<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0f172a"/>

  <!-- Amber glow -->
  <circle cx="256" cy="210" r="180" fill="url(#glow)" opacity="0.25"/>

  <!-- Open book -->
  <g transform="translate(256,230)">
    <!-- Left page -->
    <path d="M-130,-70 Q-130,-90 -110,-95 L-20,-100 L-20,70 Q-80,65 -130,75 Z"
          fill="url(#pageL)" rx="8"/>
    <!-- Right page -->
    <path d="M130,-70 Q130,-90 110,-95 L20,-100 L20,70 Q80,65 130,75 Z"
          fill="url(#pageR)" rx="8"/>
    <!-- Spine -->
    <rect x="-12" y="-102" width="24" height="178" rx="4" fill="#f59e0b"/>

    <!-- Lines on left page -->
    <line x1="-110" y1="-55" x2="-35" y2="-55" stroke="rgba(255,255,255,0.25)" stroke-width="5" stroke-linecap="round"/>
    <line x1="-110" y1="-35" x2="-35" y2="-35" stroke="rgba(255,255,255,0.25)" stroke-width="5" stroke-linecap="round"/>
    <line x1="-110" y1="-15" x2="-35" y2="-15" stroke="rgba(255,255,255,0.25)" stroke-width="5" stroke-linecap="round"/>
    <line x1="-110" y1="5"  x2="-65" y2="5"  stroke="rgba(255,255,255,0.15)" stroke-width="5" stroke-linecap="round"/>

    <!-- Right page: A B C letters -->
    <text x="35" y="-42" font-family="Poppins, Arial, sans-serif" font-size="46" font-weight="800" fill="#f59e0b" opacity="0.9">A</text>
    <text x="68" y="-0" font-family="Poppins, Arial, sans-serif" font-size="38" font-weight="800" fill="#fbbf24" opacity="0.75">B</text>
    <text x="38" y="46" font-family="Poppins, Arial, sans-serif" font-size="32" font-weight="800" fill="#fde68a" opacity="0.6">C</text>
  </g>

  <!-- Checkmark circle at top-right -->
  <circle cx="360" cy="155" r="52" fill="#10b981" opacity="0.95"/>
  <polyline points="338,155 353,172 384,138"
            stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- ALCPT text at bottom -->
  <text x="256" y="420" text-anchor="middle"
        font-family="Poppins, Arial, sans-serif"
        font-size="52" font-weight="800"
        fill="#f59e0b" letter-spacing="3">ALCPT</text>
  <text x="256" y="462" text-anchor="middle"
        font-family="Cairo, Arial, sans-serif"
        font-size="26" font-weight="600"
        fill="rgba(255,255,255,0.5)" letter-spacing="1">PRO QUIZ</text>

  <!-- Gradients -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="pageL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="pageR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
</svg>
